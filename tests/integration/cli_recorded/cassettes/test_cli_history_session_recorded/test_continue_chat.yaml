        text-decoration:none; } .u2083a5dc855c343c7125ac548fce5bb9:active, .u2083a5dc855c343c7125ac548fce5bb9:hover
        { opacity: 1; transition: opacity 250ms; webkit-transition: opacity 250ms;
        text-decoration:none; } .u2083a5dc855c343c7125ac548fce5bb9 { transition: background-color
