        class=\"section doubletextingmeaning before_steps_section sticky font_test\">\n<div
        class=\"headline_container \"><div class=\"headline_info\"><h2 class=\"section-heading\"
        onclick=\"javascript:mfTempOpenSection(1)\">\n<div class=\"mw-ui-icon mw-ui-icon-element
        indicator\"></div>\n<span class=\"mw-headline\" id=\"Double-Texting-Meaning\">Double
        Texting Meaning</span>\n</h2></div></div>\n<div id=\"doubletextingmeaning\"
        class=\"section_text\">\n<p>Double texting is when you send a second text
        before getting a response to your first one. In new relationships, double
        texting isn\u2019t usually recommended as it can come off as clingy or pushy.
        Try to wait 1-2 days for the person to respond before texting them again.\n</p>\n<div
        class=\"clearall\"></div>\n<div class=\"wh_ad_inner w_label al_grey gam\"
        data-service=\"dfp\" data-instantload=\"1\" data-adunitpath=\"/10095428/engl/engl_gam_all_scrol\"
