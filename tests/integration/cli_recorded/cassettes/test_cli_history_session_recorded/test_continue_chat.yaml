        / <span><a class=\"breadcrumb__link\" href=\"/en/questions\">Bible Questions</a></span>
        / <span><a class=\"breadcrumb__link\" href=\"/en/topics/bible-prophecy\">Bible
        Prophecy</a></span> / <span>What Is the Third Angel\u2019s Message?</span></div></div></div><div
        class=\"hero__title\"><div class=\"container\"><div class=\"row\"><div class=\"col-xs-12
        col-lg-2\"></div><div class=\"col-xs-12 col-lg-8\"><h1>What Is the Third Angel\u2019s
        Message?</h1></div></div></div></div></div><div class=\"body \"><div class=\"container\"><div><div
        class=\"row utility__position--relative\" style=\"height:auto\"><div class=\"col-lg-2\"></div><div
        class=\"col-lg-6 utility__position--initial\"><div><p>The third angel\u2019s
        message can be found in Revelation 14:9-12 and reads as follows:</p>\n<p>\u201CA
        third angel followed them, saying with a loud voice, \u2018If anyone worships
        the beast and his image, and receives his mark on his forehead or on his hand,
        he himself shall also drink of the wine of the wrath of God, which is poured
        out full strength into the cup of His indignation. . . . They have no rest
        day or night, who worship the beast and his image, and whoever receives the
        mark of his name.\u2019 Here is the patience of the saints; here are those
        who keep the commandments of God and the faith of Jesus.\u201D</p>\n<h2>Learn
        More About:</h2>\n<ul>\n<li><a href=\"https://www.bibleinfo.com/en/questions/first-angels-message\">The
        First Angel\u2019s Message</a></li>\n<li><a href=\"https://www.bibleinfo.com/en/questions/second-angels-message\">The
        Second Angel\u2019s Message</a></li>\n<li><a href=\"https://www.bibleinfo.com/en/questions/three-angels-messages\">The
        Three Angels\u2019 Messages (Overview)</a></li>\n</ul>\n<h2>Who Will You Worship?</h2>\n<p>The
        first angel describes God\u2019s side in this cosmic conflict between Christ
        and Satan. The second angel describes Satan\u2019s side. Finally, the Third
        Angel\u2019s Message demands a decision between the two. This last message
        divides the entire world into two groups. On one side stand those who worship
        \u201Cthe beast and his image\u201D and receive \u201Chis mark on his forehead
        or on his hand.\u201D On the other side stand those who reject the authority
        of the beast; these are the saints \u201Cwho keep the commandments of God
        and the faith of Jesus.\u201D</p>\n<p>Note the contrast between the two opposing
        groups. Those who receive the \u201Cmark of the beast\u201D follow convenient,
        man-made ideas and practices. Some of them are professed Christians who choose
        not to follow the Bible and the Bible alone. God\u2019s faithful Christians,
        called \u201Csaints\u201D in these verses, have as their distinguishing traits:
        patience, obedience to God\u2019s commandments, and the faith of Jesus.</p>\n<p>God
        doesn\u2019t want anyone to choose Satan\u2019s side. He has prepared the
        way, through the death of His Son Jesus, for every person to choose His side.
        Not only that, but God has prepared the most amazing reward for those who
        make that choice: an eternal heaven of peace, love and joy awaits all who
        choose God\u2019s side in this conflict.</p>\n<p>The deciding factor is worship.
        Will you worship man-made ideas and practices? Or will you worship God and
        choose the magnificent reward that He has stored up for those who love Him?
        Will you choose His side in this final conflict?</p>\n</div><div class=\"body__action\"
