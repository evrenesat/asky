        class=\"step_num\" aria-hidden=\"true\">3</div><div class=\"step\">\n<b class=\"whb\"
        aria-hidden=\"true\">Mention something exciting about your day.</b> If you
        want to celebrate with your crush or a friend, tell them about what\u2019s
        put you in such a good mood. If the person you\u2019re chatting with sees
        that you\u2019re really happy about something, they might message you back
        to share your excitement. Keep a few of the details to yourself to sound a
        little mysterious and encourage the person to ask you about it more.<sup id=\"_ref-14\"
        class=\"reference trusted\" aria-label=\"Link to Reference 14\"><a href=\"#_note-14\">[14]</a><span
        class=\"ts_popup trustedsource\" hidden id=\"ts_popup_14\" style=\"display:
        none;\">\n\t<span class=\"ts_close\">X</span>\n\t\t<a class=\"ts_trustworthy\"
        href=\"/wikiHow:Delivering-a-Trustworthy-Experience\">Expert Source</a>\n\n\t\t<span
        class=\"ts_name\"></span>\n\t\t\t<a class=\"ts_expert_link\" href=\"/Author/Imad-Jbara\"><span
        class=\"ts_expert_image\"><picture><source type=\"image/webp\" srcset=\"/images/thumb/2/25/Imad_Jbara.png/-crop-100-100-93px-Imad_Jbara.png.webp\"></source><img
        src=\"/images/thumb/2/25/Imad_Jbara.png/-crop-100-100-93px-Imad_Jbara.png\"
        alt=\"Imad Jbara\" loading=\"lazy\" width=\"30\" height=\"30\" style=\"max-width:
        30px\"></picture></span>Imad Jbara<br><span class=\"ts_blurb\">Dating Coach</span></a>\n\n\t\t<span
        class=\"ts_description\">Expert Interview</span>\n\n</span>\n</sup>\n<ul>\n<li>\u201COMG
        I just had the most amazing work day \U0001F60A You won\u2019t believe who
        I ran into!\u201D</li>\n<li>\u201COur study sessions really paid off because
        I ACED that test! Thank you SO much for your help \U0001F970\u201D</li>\n<li>\u201CHi!!
        I got some amazing news! Let me know when you see this so I can tell you all
        about it!\u201D</li>\n</ul>\n</div>\n<div class=\"clearall\"></div>\n<div
        class=\"scrolltomarker\" data-isstep=\"1\" id=\"scrollto_marker_steps_14\"></div>\n</li>\n<li
