        dmUFtb wHaque g5GTcb\"><div class=\"jXK9ad-SmKAyb\"><div class=\"tyJCtd mGzaTb
        Depvyb baZpAe\"><p  dir=\"ltr\" class=\"zfr3Q CDt4Ke \" style=\"background-color:
        transparent; border-bottom: none; border-left: none; border-right: none; border-top:
        none; line-height: 1.38; margin-bottom: 8.0pt; margin-top: 0.0pt; padding-bottom:
        0.0pt; padding-left: 0.0pt; padding-right: 0.0pt; padding-top: 0.0pt;\"><span
        class=\"jgG6ef C9DxTc \" style=\"color: #ff9900; font-family: Merriweather,
        Arial; font-variant: normal; font-weight: 700; vertical-align: baseline;\">The
        Three Angels&#39; Messages</span><span class=\"jgG6ef C9DxTc \" style=\"color:
        #ffffff; font-family: Merriweather, Arial; font-variant: normal; font-weight:
        700; vertical-align: baseline;\">--It is our privilege to expect large things,
        even the demonstration of the Spirit of God. This is a power which will convict
        and convert the soul. Our message is a life-and-death message, and we must
        let this message appear as it is--the great power of God. Then the Lord will
        make it effectual. We are to present it in all its telling force. The first
        and second angels&#39; messages are bound up with the third angel&#39;s message.
        The power of the proclamation of the first and second angels&#39; messages
        is to be concentrated in the third.--Lt 209, 1899.\_ {VSS 329.1}\_</span></p><p
        \ dir=\"ltr\" class=\"zfr3Q CDt4Ke \" style=\"background-color: transparent;
        border-bottom: none; border-left: none; border-right: none; border-top: none;
        line-height: 1.38; margin-bottom: 8.0pt; margin-top: 0.0pt; padding-bottom:
        0.0pt; padding-left: 0.0pt; padding-right: 0.0pt; padding-top: 0.0pt;\"><span
        class=\"jgG6ef C9DxTc \" style=\"color: #ff9900; font-family: Merriweather,
        Arial; font-variant: normal; font-weight: 700; vertical-align: baseline;\">The
        Testing Message</span><span class=\"jgG6ef C9DxTc \" style=\"color: #ffffff;
        font-family: Merriweather, Arial; font-variant: normal; font-weight: 700;
        vertical-align: baseline;\">--Let every discourse that does not enlighten
        the soul, that does not answer the question, What must I do to be saved? be
        cut off from your program. Preach the testing message of the third angel.
        It is essential that our ministers preach the truth that has a direct bearing
        on the message for this time, and that they present the subjects in the most
        simple language. What must I do to be saved, and the righteousness of Christ,
        are themes that are of vital importance to the people.-- Lt 29, 1895.</span></p><p
        \ dir=\"ltr\" class=\"zfr3Q CDt4Ke \" style=\"background-color: transparent;
        border-bottom: none; border-left: none; border-right: none; border-top: none;
        line-height: 1.38; margin-bottom: 8.0pt; margin-top: 0.0pt; padding-bottom:
        0.0pt; padding-left: 0.0pt; padding-right: 0.0pt; padding-top: 0.0pt;\"><span
        class=\"jgG6ef C9DxTc \" style=\"color: #ff9900; font-family: Merriweather,
        Arial; font-variant: normal; font-weight: 700; vertical-align: baseline;\">Third
        Angel&#39;s Message a Life-and-Death Question. </span><span class=\"jgG6ef
        C9DxTc \" style=\"color: #ffffff; font-family: Merriweather, Arial; font-variant:
        normal; font-weight: 700; vertical-align: baseline;\">-We know that now everything
        is at stake. The third angel&#39;s message is to be at this time regarded
        as of the highest importance. It is a life-and-death question.\_ {9MR 290.1}\_</span></p><p
        \ dir=\"ltr\" class=\"zfr3Q CDt4Ke \" style=\"background-color: transparent;
        border-bottom: none; border-left: none; border-right: none; border-top: none;
        line-height: 1.38; margin-bottom: 8.0pt; margin-top: 0.0pt; padding-bottom:
        0.0pt; padding-left: 0.0pt; padding-right: 0.0pt; padding-top: 0.0pt;\"><span
        class=\"jgG6ef C9DxTc \" style=\"color: #ff9900; font-family: Merriweather,
        Arial; font-variant: normal; font-weight: 700; vertical-align: baseline;\">Increasing
        Importance of the Three Angels&#39; Messages.</span><span class=\"jgG6ef C9DxTc
        \" style=\"color: #ffffff; font-family: Merriweather, Arial; font-variant:
        normal; font-weight: 700; vertical-align: baseline;\">--The truth for this
        time, the third angel&#39;s message, is to be proclaimed with a loud voice,
        meaning with increasing power, as we approach the great final test. . . .
        The present truth for this time comprises the messages, the third angel&#39;s
        message succeeding the first and the second. The presentation of this message
        with all it embraces is our work. We stand as the remnant people in these
        last days to promulgate the truth and swell the cry of the third angel&#39;s
        wonderful distinct message, giving the trumpet a certain sound. Eternal truth,
        which we have adhered to from the beginning, is to be maintained in all its
        increasing importance to the close of probation. The trumpet is to give no
        uncertain sound. . . .\_ {9MR 291.1}\_</span></p><p  dir=\"ltr\" class=\"zfr3Q
        CDt4Ke \" style=\"background-color: transparent; border-bottom: none; border-left:
        none; border-right: none; border-top: none; line-height: 1.38; margin-bottom:
        0.0pt; margin-left: 0.0pt; margin-top: 0.0pt; padding-bottom: 0.0pt; padding-left:
        0.0pt; padding-right: 0.0pt; padding-top: 0.0pt; text-indent: 0.0pt;\"><span
        class=\"jgG6ef C9DxTc \" style=\"color: #ffffff; font-family: Merriweather,
        Arial; font-variant: normal; font-weight: 700; vertical-align: baseline;\">\_</span><span
        class=\"jgG6ef C9DxTc \" style=\"color: #ff9900; font-family: Merriweather,
        Arial; font-variant: normal; font-weight: 700; vertical-align: baseline;\">Relevance
        of the Message.</span><span class=\"jgG6ef C9DxTc \" style=\"color: #ffffff;
        font-family: Merriweather, Arial; font-variant: normal; font-weight: 700;
        vertical-align: baseline;\">--All the people of God are now to stand on the
        platform of truth as it has been given in the third angel&#39;s message. .
        . . The only hope for anyone is to hold fast the evidences that have confirmed
        the truth in righteousness. Let these be proclaimed over and over again until
        the close of earth&#39;s history.--Manuscript 61, 1906, p. 3. (&quot;Hold
        Fast the Beginning of Your Confidence,&quot; June 3, 1906.</span></p><br><p
        \ dir=\"ltr\" class=\"zfr3Q CDt4Ke \" style=\"background-color: transparent;
        border-bottom: none; border-left: none; border-right: none; border-top: none;
        line-height: 1.38; margin-bottom: 0.0pt; margin-left: 0.0pt; margin-top: 0.0pt;
        padding-bottom: 0.0pt; padding-left: 0.0pt; padding-right: 0.0pt; padding-top:
        0.0pt; text-indent: 0.0pt;\"><span class=\"jgG6ef C9DxTc \" style=\"color:
        #ffffff; font-family: Merriweather, Arial; font-variant: normal; font-weight:
        700; vertical-align: baseline;\">\_</span><span class=\"jgG6ef C9DxTc \" style=\"color:
        #ff9900; font-family: Merriweather, Arial; font-variant: normal; font-weight:
        700; vertical-align: baseline;\">Universal Nature of the Third Angel&#39;s
        Message</span><span class=\"jgG6ef C9DxTc \" style=\"color: #ffffff; font-family:
        Merriweather, Arial; font-variant: normal; font-weight: 700; vertical-align:
        baseline;\">.--Every feature of the third angel&#39;s message is to be proclaimed
        in all parts of the world. . . . This message is a testing message. Received
        into honest hearts, it will prove an antidote for all the world&#39;s sins
        and sorrows. No conditions of climate, of poverty, or ignorance, or of prejudice
        can hinder its efficiency, or lessen its adaptability to the needs of mankind.--Manuscript
        75, 1906, p. 3. (&quot;A Caution Against Heavy Investment in Food Manufacture,&quot;
        September 29, 1906.)\_ {9MR 292.1}\_</span></p><br><p  dir=\"ltr\" class=\"zfr3Q
        CDt4Ke \" style=\"background-color: transparent; border-bottom: none; border-left:
        none; border-right: none; border-top: none; line-height: 1.38; margin-bottom:
        0.0pt; margin-left: 0.0pt; margin-top: 0.0pt; padding-bottom: 0.0pt; padding-left:
        0.0pt; padding-right: 0.0pt; padding-top: 0.0pt; text-indent: 0.0pt;\"><span
        class=\"jgG6ef C9DxTc \" style=\"color: #ff9900; font-family: Merriweather,
        Arial; font-variant: normal; font-weight: 700; vertical-align: baseline;\">Truths
        of the Third Angel&#39;s Message Constantly Unfolding.</span><span class=\"jgG6ef
        C9DxTc \" style=\"color: #ffffff; font-family: Merriweather, Arial; font-variant:
        normal; font-weight: 700; vertical-align: baseline;\">--The third angel&#39;s
        message reveals the great saving truth for this time. Its truths are constantly
        unfolding, and it is God&#39;s design that even the children and youth shall
        understand intelligently what God requires, that they may distinguish between
        righteousness and sin, between obedience and disobedience.--Manuscript 67,
        1909, p. 3. (&quot;A High Standard,&quot; October 7, 1909.)</span></p><br><p
        \ dir=\"ltr\" class=\"zfr3Q CDt4Ke \" style=\"background-color: transparent;
        border-bottom: none; border-left: none; border-right: none; border-top: none;
        line-height: 1.38; margin-bottom: 8.0pt; margin-left: 0.0pt; margin-top: 0.0pt;
        padding-bottom: 0.0pt; padding-left: 0.0pt; padding-right: 0.0pt; padding-top:
        0.0pt; text-indent: 0.0pt;\"><span class=\"jgG6ef C9DxTc \" style=\"color:
        #ffffff; font-family: Merriweather, Arial; font-variant: normal; font-weight:
        700; vertical-align: baseline;\">Several have written to me, inquiring if
        the message of justification by faith is the third angel&#39;s message, and
        I have answered, &quot;It is the third angel&#39;s message in verity.&quot;--1SM
        372 (1890).\_ {LDE 199.4}</span></p></div></div></div></div></div></div></div></div></div></section></div><div
