        class=\"author-name\" itemprop=\"name\">Ron Clendenin</span></a></span></span>
        \t\t</div>\n\t\t\t\t\t</header>\n\t\t\t\n\t\t<div class=\"entry-content\"
        itemprop=\"text\">\n\t\t\t\n<p>Double texting: the dating faux pas that can
        make you look clingy, desperate, or just plain annoying.&nbsp;</p>\n\n\n\n<p>But
        hold up, is double texting really that bad?&nbsp;</p>\n\n\n\n<p>The truth
        is, there's a right and a wrong way to go about it.&nbsp;</p>\n\n\n\n<p>In
        the world of modern dating, where communication is key, mastering the art
        of the double text can be the difference between a budding romance and a one-way
        ticket to being ghosted.</p>\n\n\n\n<span id=\"more-131464\"></span>\n\n\n<div
        style=\"max-width: -moz-fit-content; \" class=\"wp-block-ub-table-of-contents-block
