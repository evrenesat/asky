        \    \n     <div id='dspromopanel'>     \n     <b>Important: I found the best
        opener ever!</b>\n     <img data-src='https://textgod.com/wp-content/themes/tg1/images/2024/dailyscreenshotpromo.png'
        alt='Daily screenshot' />\n     <p>Its psychologically irresistible to ignore.
        I call it <u>the Clickbait-Opener</u>. And I made a free video with screen-shot
        examples on how to use it.</p>\n     <a class='csbtn dsartpromobtn' href=''
        data-leadbox-popup='bjTsmXxAHngKvzDdFBXfSH' data-leadbox-domain='lifevent.lpages.co'>Get
        it for free!</a>\n     \n     </div>\n     <a name=\"1-Relax-if-she-breaks-the-pattern\"></a><h2>1.
        Relax if she breaks the pattern</h2>\n<p>This makes women think you&#8217;re
        desperate for her attention.</p>\n<p>Suppose you\u2019re having a fun convo
        with a girl on Tinder.</p>\n<p>You\u2019re both texting back and forth at
        a fast pace: multiple exchanges per day. And you just sent her a series of
        texts no different than normal.</p>\n<p>But something is different from normal\u2026</p>\n<p>SHE
        DOESN\u2019T REPLY!</p>\n<p>And it\u2019s already been several hours since
        you hit \u2018send\u2019.</p>\n<p>Here&#8217;s what destroys your attraction
        if she&#8217;s not already into you:</p>\n<p><strong>Texting again on the
        same day.<br />\n</strong></p>\n<p>Why is that so bad?</p>\n<p>Because it
        shows you can\u2019t even go a few hours without hearing back from her.</p>\n<p>Which
        tells her 1 of 2 things:</p>\n<ul>\n<li>You have nothing of interest going
        on in your life</li>\n<li>She\u2019s all you think about</li>\n</ul>\n<p>As
        you can probably guess, neither of those 2 assumptions make you seem attractive.</p>\n<div
        class=\"tipblock\">\n<h3>Holy Tip:</h3>\n<p>There is one time where double
        texting is always acceptable and won\u2019t make you seem overly interested:</p>\n<p>Confirming
        the date.</p>\n<p>If the date is only a few hours away and she ignored your
        last text, double text the fuark out of her.</p>\n<p>When it comes to figuring
        out plans, double texting is legit.</p>\n</div>\n<p>So please, for all that
        is holy: <u>don\u2019t double text on the same day.</u></p>\n<p>It makes you
        look like a clown.</p>\n<p><img class=\"aligncenter size-full wp-image-4421\"
        data-src=\"https://textgod.com/wp-content/uploads/2020/07/double-texting-a-girl.jpg\"
        alt=\"\" width=\"400\" height=\"319\" data-srcset=\"https://textgod.com/wp-content/uploads/2020/07/double-texting-a-girl.jpg
        400w, https://textgod.com/wp-content/uploads/2020/07/double-texting-a-girl-300x239.jpg
        300w, https://textgod.com/wp-content/uploads/2020/07/double-texting-a-girl-160x128.jpg
        160w\" sizes=\"(max-width: 400px) 100vw, 400px\" /></p>\n<p>&nbsp;</p>\n<p>Because
        all you\u2019re doing is scaring her away.</p>\n<p>So what should you do if
        she takes a little longer to reply?</p>\n<p>Find out in the next tip.</p>\n\n
        \    \n     <div id='dspromopanel'>     \n     <b>Got no matches? Does your
        profile suck?</b>\n     <img data-src='https://textgod.com/wp-content/themes/tg1/images/2024/dailyscreenshotpromo.png'
        alt='Daily screenshot' />\n     <p>I'm currently letting guys use my <u>personal
        Profile Checklist</u> for free. It'll turn your boring profile into a magnetic
        and attractive eye-catcher.</p>\n     <a class='csbtn dsartpromobtn' href=''
        data-leadbox-popup='LzsNBgrFTiFyWyWMPx9fDc' data-leadbox-domain='lifevent.lpages.co'>Get
        it for free!</a>\n     \n     </div>\n     <a name=\"2-Focus-on-how-well-you-know-her\"></a><h2>2.
        Focus on how well you know her</h2>\n<p>One possible explanation for why she\u2019s
        taking so long to reply is that she hates your guts.</p>\n<p>But it\u2019s
        unlikely, or else you would have known.</p>\n<p><strong>Why she didn\u2019t
        reply is a tough question to answer.</strong></p>\n<p>For starters, we don\u2019t
        even know if she\u2019s read your text.</p>\n<p>She may just be distracted
        and hasn\u2019t had a chance to check her phone.</p>\n<p><em>\u201CC\u2019mon,
        Louis\u2026 I\u2019m yet to meet a person who doesn\u2019t check their phone
        for longer than 24 hours.\u201D</em></p>\n<p>Good point, but\u2026</p>\n<p>Maybe
        she unlocked her screen, which got rid of your text notification and lost
        your text in her bursting inbox.</p>\n<p>Happens to me all the time. Sometimes
        I\u2019ll forget about a girl for days.</p>\n<p><em>\u201CHmm\u2026 But we\u2019ve
        known each other for a while and she usually texts back quickly.\u201D</em></p>\n<p>An
        EXCELLENT point.</p>\n<p>That\u2019s precisely how you want to think when
        a girl takes long to text back. And by \u2018that\u2019 I mean taking into
        consideration:</p>\n<ul>\n<li>How well you know each other</li>\n<li>Her texting
        pattern</li>\n</ul>\n<p>Why a girl on Tinder doesn\u2019t text you back is
        hugely different from why your girlfriend doesn\u2019t text back.</p>\n<p>A
        stranger obviously has no social obligation to keep you updated, but a girlfriend
        does.</p>\n<p>What does this mean?</p>\n<p>The time you want to wait for double
        texting depends on the kind of relationship you have.</p>\n<p>Roughly speaking:
        the less you know her, the longer you wait.</p>\n<p>Want to know <em>precisely</em>
        how long to wait before you double text?</p>\n<p>Check out my next article:</p>\n<ul>\n<li><a
        href=\"https://textgod.com/she-didnt-text-back-how-long-should-i-wait/\">How
        long to wait when she doesn\u2019t text back</a></li>\n</ul>\n<a name=\"3-Match-her-level-of-investment\"></a><h2>3.
        Match her level of investment</h2>\n<p>Do this and you&#8217;ll instantly
        become more attractive to her.</p>\n<p>Let&#8217;s break down a conversation
        from one of my clients.</p>\n<p>Some context: the two went on a date on Friday</p>\n<p><div
        class=\"msgmc\"><div class=\"msgm\">Had a great time \U0001F642</div></div></p>\n<p><div
        class=\"msgfc\"><div class=\"msgf\">Me too \U0001F642</div></div></p>\n<p><div
        class=\"msgmc\"><div class=\"msgm\">How\u2019s your Saturday been so far?</div></div></p>\n<p>Pretty
        good start.</p>\n<p>Except that\u2026</p>\n<p>She didn\u2019t reply until
        Tuesday!</p>\n<p><div class=\"msgfc\"><div class=\"msgf\">Tuesday has been
        great \U0001F643</div></div></p>\n<p><div class=\"msgfc\"><div class=\"msgf\">How\u2019s
        your week been so far?</div></div></p>\n<p><div class=\"msgmc\"><div class=\"msgm\">Haha,
        you work at granny esque texting speeds</div></div></p>\n<p>I like how he\u2019s
        verbalizing his frustration about her slow reaction.</p>\n<p>It shows her
        that he has boundaries that she\u2019d better not cross if she wants to see
        him again.</p>\n<p>That said, I don\u2019t love how our bro typed \u2018Haha\u2019
        to soften the blow of his valid comment. It shows he\u2019s worried about
        offending her and he really shouldn\u2019t be.</p>\n<p>But that\u2019s not
        everything our bro sent.</p>\n<p>He also wrote:</p>\n<p><div class=\"msgmc\"><div
        class=\"msgm\">Great. I\u2019m in an awesome mood</div></div></p>\n<p><div
        class=\"msgmc\"><div class=\"msgm\">Which is why I want to take out a cute
        girl for cocktails tomorrow at\u2026 8 PM</div></div></p>\n<p>*screams with
        rage*</p>\n<p>Now, I don\u2019t think his texts are particularly badly written.
        In fact, the way he asked her out is pretty good.</p>\n<p>It shows confidence.
        Great.</p>\n<p>Why I\u2019m angry, is because he shouldn\u2019t be putting
        in so much effort after she didn\u2019t reply for FOUR DAYS! Plus, she took
        his question and bounced it right back.</p>\n<p>Could she put in even less
        effort?</p>\n<p>Turns out, yes.</p>\n<p>How long do you think it took her
        to answer?</p>\n<p>More than 3 days. And that\u2019s not even the best of
        it.</p>\n<p>Can you guess what she replied?</p>\n<p><div class=\"msgfc\"><div
        class=\"msgf\">\U0001F475</div></div></p>\n<p>Grandma emoji!</p>\n<p>Now,
        it may seem like I\u2019m angry at her, but I\u2019m not.</p>\n<p>She can
        invest as little time and energy as she likes. No worries.</p>\n<p>The reason
        I\u2019m angry is because it hurts me to see fellow text soldiers get played
        for fools.</p>\n<p>After the grandma emoji, our bro sent another text that
        she ignored.</p>\n<p>And a few days later he double texted, after which she\u2026</p>\n<p><a
        href=\"https://textgod.com/she-ghosted-me/\">Ghosted him</a>.</p>\n<p>You
        know what hurts the most?</p>\n<p>He could have still been texting her if
        he used a simple but powerful strategy, called:</p>\n<p><strong>Matching her
        investment.</strong></p>\n<p>No, that doesn\u2019t mean that you make her
        wait too. Because that\u2019s butthurt energy, and you only want to show positive
        energy.</p>\n<p>By matching her investment, I want you to:</p>\n<ul>\n<li>Match
        her message count</li>\n<li>Match her message length</li>\n</ul>\n<p>While
        keeping your texts as emotionally stimulating as possible.</p>\n<div class=\"tipblock\">\n<h3>Holy
        Tip:</h3>\n<p>Don\u2019t know what an emotionally stimulating text looks like?</p>\n<p>Or
        how to write them yourself?</p>\n<p>No problem.</p>\n<p>Just check out my
        10 Texts That Always Work.</p>\n<p>Why do they always work?</p>\n<p>Because
        they do a great job of stimulating her emotions.</p>\n<p><script src=\"//static.leadpages.net/leadboxes/current/embed.js\"
        async defer></script><a href=\"\" data-leadbox-popup=\"ayWWFCCZdh556EAFBvXzFP\"
        data-leadbox-domain=\"lifevent.lpages.co\">Grab \u2018em here for ZERO dollars.</a></p>\n</div>\n<p>No
        idea how to be emotionally stimulating?</p>\n<p>You will after the next tip.</p>\n<a
        name=\"4-Be-cool-when-she-gives-you-a-compliment\"></a><h2>4. Be cool when
        she gives you a compliment</h2>\n<p>Many men give women a reason to stop replying.
        Here&#8217;s a great way to keep her interested.</p>\n<p><strong>Stay cool.</strong></p>\n<p>Whether
        it\u2019s on Tinder or during the early dating stage, women LOVE to psycho-analyze
        you by giving you <a href=\"https://textgod.com/how-to-compliment-a-girl-over-text/\">a
        compliment</a>.</p>\n<p>Your Tinder match may say:</p>\n<p><div class=\"msgfc\"><div
        class=\"msgf\">You have a fantastic smile</div></div></p>\n<p>Which will make
        most guys think, <em>\u201COMG. I\u2019m in! Now I can say all those thirsty
        thoughts I had.\u201D</em></p>\n<p><div class=\"msgmc\"><div class=\"msgm\">And
        you have a gorgeous body \U0001F60D</div></div></p>\n<p>Or:</p>\n<p><div class=\"msgmc\"><div
        class=\"msgm\">Thx. So when are we gonna meet up for mojitos? \U0001F609</div></div></p>\n<p>Wah-wahhhhh\u2026</p>\n<p>You
        just lost major attraction points.</p>\n<p>Look, fellas. If a girl says you
        have a fantastic smile, she genuinely means it.</p>\n<p>But she&#8217;s likely
        not just saying it to brighten your day, she\u2019s giving you a compliment
        because she\u2019s curious about what you&#8217;ll say in return.</p>\n<p>Will
        you be an excited little puppy and leap into her arms? Or will you be cool
        about it because it takes more than a compliment to win you over?</p>\n<p>Women
        often ignore the puppies.</p>\n<a name=\"5-Show-her-that-you-have-standards\"></a><h2>5.
        Show her that you have standards</h2>\n<p>Many women lose interest because
        they feel like they can walk all over you. A doormat isn&#8217;t sexy, right?
        Not even if it has a print of an anime waifu.</p>\n<p>So what do you do?</p>\n<p><strong>If
        you can choose to be liked or respected, choose respect.</strong></p>\n<p>Here&#8217;s
        an example.</p>\n<p>She doesn&#8217;t reply to your messages for days, ignores
        all the stuff you said, and just goes:</p>\n<p><div class=\"msgfc\"><div class=\"msgf\">How
        are you?</div></div></p>\n<p>The audacity!</p>\n<p>She disappears off the
        face of the earth and then thinks she can wiggle her way back with a simple
        question?</p>\n<p>I say all this with tongue in cheek, but it&#8217;s honestly
        a little rude.</p>\n<p>Yes, she&#8217;s being attentive. But she&#8217;s also
        made clear that you&#8217;re not a big priority for her by taking forever
        to get back to you.</p>\n<p>What do you do?</p>\n<p>It depends on what kind
        of relationship you&#8217;re hoping to build with her.</p>\n<p>But if any
        of these relationships involve mutual respect, you want to show her that you&#8217;re
        not crazy about being treated this way.</p>\n<p>Just be playful about it.</p>\n<p>Like
        so.</p>\n<p><div class=\"msgmc\"><div class=\"msgm\">OMG FINALLY! I\u2019ve
        been staring at my screen and waiting for your message this whole time!!</div></div></p>\n<p>Then
        you dial back your investment while staying warm and fun.</p>\n<a name=\"6-Respond-like-this-to-a-change-in-date-plans\"></a><h2>6.
        Respond like this to a change in date plans</h2>\n<p>Okay, so you\u2019ve
        set up a date for 8 PM tonight. An hour from now.</p>\n<p>And the last time
        you spoke over text was a few hours ago.</p>\n<p>So you think everything is
        good to go, but then you receive the next text:</p>\n<p><div class=\"msgfc\"><div
        class=\"msgf\">Something came up and I can\u2019t make it tonight. I\u2019m
        so sorry!</div></div></p>\n<p>Most guys will generally respond in 1 of 2 ways:</p>\n<ul>\n<li>Be
        totally <span style=\"text-decoration: line-through;\">understanding</span>
        pussywhipped and make plans for another time</li>\n<li>Go apeshit</li>\n</ul>\n<p>Both
        are equally bad.</p>\n<p>The first shows that she can do whatever she wants
        and still have you.</p>\n<p>The second shows that you\u2019re an untrustworthy
        a-hole.</p>\n<p>So what should you do?</p>\n<p><strong>Be cool while subtly
        showing she crossed a line.</strong></p>\n<p><div class=\"msgmc\"><div class=\"msgm\">No
        stress. I\u2019ll fire up my PS4 and be the most overdressed videogamer of
        all time</div></div></p>\n<p>How does she know she goofed a little?</p>\n<p>Effort.</p>\n<p>After
        all, you dressed up for her! That&#8217;s incredibly sweet.</p>\n<p>If she
        likes you, she&#8217;ll feel bad for flaking and probably give you a better
        explanation or apology.</p>\n<p>If she doesn\u2019t give a more detailed explanation
        about why she flaked, dial down your investment.</p>\n<p>Because if she doesn\u2019t
        feel shitty about her actions, she\u2019s not emotionally invested in you.</p>\n<p>So,
        don\u2019t even think about setting up a new date for a while.</p>\n<a name=\"The-best-3-choices-if-you-want-to-double-text-her\"></a><h2>The
        best 3 choices if you want to double text her</h2>\n<p>Okay, you\u2019ve waited
        long enough and you <em>know</em> that she\u2019s read your text.</p>\n<p>What
        do you do once the pain of being ignored subsides?</p>\n<p>Firstly, don\u2019t
        panic or automatically assume <a href=\"https://textgod.com/she-ignores-my-texts/\">she\u2019s
        lost interest</a>.</p>\n<p>She could have ignored your text for several reasons:</p>\n<ul>\n<li>She
        didn\u2019t know what to reply</li>\n<li>She didn\u2019t read your text until
        much, much later and is afraid <em>you</em> may have lost interest in her,
        so she doesn\u2019t want to risk being left on read by you</li>\n<li>She didn\u2019t
        like what you said and didn\u2019t want to reward you with an answer</li>\n</ul>\n<p>Without
        seeing your phone, I can impossibly tell why she didn\u2019t text back.</p>\n<p>So
        I\u2019m going to give you 3 powerful ways to get a reply. Each for a different
        scenario.</p>\n<p>Let\u2019s get started.</p>\n<a name=\"1-Call-her\"></a><h2>1.
        Call her</h2>\n<p>Sounds super desperate, right?</p>\n<p>Doesn\u2019t have
        to be.</p>\n<p>If you\u2019ve already gone on a date or are both mature, a
        telephone call shows confidence.</p>\n<p>It basically says, <em>\u201CYou
        ignoring me is not going to work. Step it up.\u201D</em></p>\n<p>That said,
        she probably won\u2019t pick up the call. But it\u2019ll prompt her to reply
        to the message.</p>\n<p>I also recommend you leave a brief voice message explaining
        your attempted call. Hearing your voice makes you seem more real.</p>\n<a
        name=\"2-Double-text\"></a><h2>2. Double text</h2>\n<p>A drawback from double
        texting is that it shows effort:</p>\n<p>She didn\u2019t put in any work and
        still got you to text her.</p>\n<p>So double texting can make you seem a little
        desperate.</p>\n<p>That said, if you don\u2019t try to grab her attention,
        you more than likely won\u2019t hear from her again.</p>\n<p>So you have little
