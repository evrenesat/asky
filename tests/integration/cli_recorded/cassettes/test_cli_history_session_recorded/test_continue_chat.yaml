        class=\\\"mw-parser-output\\\"><p>\\u00a9 2026 wikiHow, Inc. All rights reserved.
        wikiHow, Inc. is the copyright holder of this image under U.S. and international
        copyright laws. This image may not be used by other entities without the express
        written consent of wikiHow, Inc.<br>\\n<\\/p><p><br \\/>\\n<\\/p><\\/div>\",\"zoomWidth\":728,\"zoomHeight\":546,\"zoomUrl\":\"\\/images\\/thumb\\/a\\/a8\\/What-Is-Double-Texting-Step-4.jpg\\/v4-728px-What-Is-Double-Texting-Step-4.jpg.webp\"}</script></div></a></div>\n<div
        class=\"step_num\" aria-hidden=\"true\">3</div><div class=\"step\">\n<b class=\"whb\"
        aria-hidden=\"true\">If you\u2019re talking about something serious, call
        instead of double texting.</b> It\u2019s better to stick to casual conversations
        when you\u2019re chatting over text so you don\u2019t miscommunicate or get
        confused.<sup id=\"_ref-2\" class=\"reference trusted\" aria-label=\"Link
        to Reference 2\"><a href=\"#_note-2\">[2]</a><span class=\"ts_popup trustedsource\"
        hidden id=\"ts_popup_2\" style=\"display: none;\">\n\t<span class=\"ts_close\">X</span>\n\t\t<a
        class=\"ts_trustworthy\" href=\"/wikiHow:Delivering-a-Trustworthy-Experience\">Expert
        Source</a>\n\n\t\t<span class=\"ts_name\"></span>\n\t\t\t<a class=\"ts_expert_link\"
        href=\"/Author/Joshua-Pompey\"><span class=\"ts_expert_image\"><picture><source
        type=\"image/webp\" srcset=\"/images/thumb/4/4a/Joshua_Pompey.png/-crop-100-100-100px-Joshua_Pompey.png.webp\"></source><img
        src=\"/images/thumb/4/4a/Joshua_Pompey.png/-crop-100-100-100px-Joshua_Pompey.png\"
        alt=\"Joshua Pompey\" loading=\"lazy\" width=\"30\" height=\"30\" style=\"max-width:
        30px\"></picture></span>Joshua Pompey<br><span class=\"ts_blurb\">Relationship
        Expert</span></a>\n\n\t\t<span class=\"ts_description\">Expert Interview</span>\n\n</span>\n</sup>
        If you want to have a serious talk about how you\u2019re feeling or about
        a pressing issue, pick up the phone and call them instead.<sup id=\"_ref-3\"
