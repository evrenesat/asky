        460w\"></source><source type=\"image/webp\" media=\"(min-width: 729px)\" width=\"728\"
        height=\"546\" srcset=\"/images/thumb/4/44/What-Is-Double-Texting-Step-11.jpg/v4-728px-What-Is-Double-Texting-Step-11.jpg.webp
        728w\"></source><source type=\"image/jpeg\" media=\"(min-width: 729px)\" width=\"728\"
        height=\"546\" srcset=\"/images/thumb/4/44/What-Is-Double-Texting-Step-11.jpg/v4-728px-What-Is-Double-Texting-Step-11.jpg
        728w\"></source><img alt=\"Wait 1\u20132 days to send another text.\" src=\"https://www.wikihow.com/images/thumb/4/44/What-Is-Double-Texting-Step-11.jpg/v4-460px-What-Is-Double-Texting-Step-11.jpg\"
        decoding=\"async\" class=\"whcdn\" width=\"460\" height=\"345\" loading=\"lazy\"></picture><div
        class=\"image_details\"><script type=\"application/json\">{\"smallUrl\":\"https:\\/\\/www.wikihow.com\\/images\\/thumb\\/4\\/44\\/What-Is-Double-Texting-Step-11.jpg\\/v4-460px-What-Is-Double-Texting-Step-11.jpg\",\"bigUrl\":\"\\/images\\/thumb\\/4\\/44\\/What-Is-Double-Texting-Step-11.jpg\\/v4-728px-What-Is-Double-Texting-Step-11.jpg\",\"smallWidth\":460,\"smallHeight\":345,\"bigWidth\":728,\"bigHeight\":546,\"licensing\":\"<div
        class=\\\"mw-parser-output\\\"><p>\\u00a9 2026 wikiHow, Inc. All rights reserved.
        wikiHow, Inc. is the copyright holder of this image under U.S. and international
        copyright laws. This image may not be used by other entities without the express
        written consent of wikiHow, Inc.<br>\\n<\\/p><p><br \\/>\\n<\\/p><\\/div>\",\"zoomWidth\":728,\"zoomHeight\":546,\"zoomUrl\":\"\\/images\\/thumb\\/4\\/44\\/What-Is-Double-Texting-Step-11.jpg\\/v4-728px-What-Is-Double-Texting-Step-11.jpg.webp\"}</script></div></a></div><div
        class=\"step\">\n<b class=\"whb\" aria-hidden=\"true\">Wait 1\u20132 days
        to send another text.</b> Even if you\u2019re really tempted to reach out
        again, <a href=\"/Relationships/How-Long-Should-I-Wait-to-Double-Text\" title=\"How
        Long Should I Wait to Double Text\">give them some time to respond</a>. It\u2019s
        normal to have a few days in between texts with your crush or at the start
        of a relationship, so try not to worry. They could actually be busy or be
        away from their phone and they\u2019ll respond when they get the chance.<sup
        id=\"_ref-10\" class=\"reference trusted\" aria-label=\"Link to Reference
        10\"><a href=\"#_note-10\">[10]</a><span class=\"ts_popup trustedsource\"
        hidden id=\"ts_popup_10\" style=\"display: none;\">\n\t<span class=\"ts_close\">X</span>\n\t\t<a
        class=\"ts_trustworthy\" href=\"/wikiHow:Delivering-a-Trustworthy-Experience\">Expert
        Source</a>\n\n\t\t<span class=\"ts_name\"></span>\n\t\t\t<a class=\"ts_expert_link\"
        href=\"/Author/Joshua-Pompey\"><span class=\"ts_expert_image\"><picture><source
        type=\"image/webp\" srcset=\"/images/thumb/4/4a/Joshua_Pompey.png/-crop-100-100-100px-Joshua_Pompey.png.webp\"></source><img
        src=\"/images/thumb/4/4a/Joshua_Pompey.png/-crop-100-100-100px-Joshua_Pompey.png\"
        alt=\"Joshua Pompey\" loading=\"lazy\" width=\"30\" height=\"30\" style=\"max-width:
        30px\"></picture></span>Joshua Pompey<br><span class=\"ts_blurb\">Relationship
        Expert</span></a>\n\n\t\t<span class=\"ts_description\">Expert Interview</span>\n\n</span>\n</sup>\n<ul>\n<li>Giving
        the person more time also gives them a chance to miss you. Once they realize
        they haven\u2019t heard from you, they\u2019ll check up and see the text they
        missed.</li>\n<li>\n<b>Reader Poll:</b> We asked 562 wikiHow readers how many
        times they think it\u2019s okay to text someone in a row without a response
        and <b>56%</b> of them said <b>twice.</b> <a class=\"dynamic_poll_link\" target=\"_blank\"
        href=\"/Stage-5-Clinger#reader_poll_2539\">[Take Poll]</a>\n</li>\n</ul>\n</div>\n<div
        class=\"clearall\"></div>\n<div class=\"scrolltomarker\" data-isstep=\"1\"
        id=\"scrollto_marker_steps_11\"></div>\n</li></ol>\n<div class=\"clearall\"></div>\n</div>\n</div>\n\n<div
        class=\"section steps   sticky hide_step_numbers font_test\">\n<div class=\"headline_container
        \ block_header in-block subheadline\">\n<div class=\"altblock\"></div>\n<div
        class=\"headline_info\">\n<div class=\"method_label\">Section 5 of 5:</div>\n<h3><span
        class=\"mw-headline\" id=\"What-to-Say-in-a-Double-Text\">What to Say in a
        Double Text\n</span></h3>\n</div>\n<a class=\"large_pdf_link pdf_link  disabled
        \ pdf_link_steps  \" href=\"#\">\n\t\n\t<img class=\"pdf_link-img\" loading=\"lazy\"
        src=\"/extensions/wikihow/socialstamp/images/icon-pdf.svg\" alt=\"PDF download\"
        width=\"150\" height=\"150\">\n\t<span class=\"pdfText\">Download Article</span>\n\t\n</a>\n</div>\n<div
        id=\"steps_5\" class=\"section_text\">\n<ol class=\"steps_list_2\">\n<li id=\"step-id-411\">\n<a
        name=\"step_5_1\" class=\"stepanchor\"></a><div class=\"mwimg  largeimage
        \ floatcenter \"><a href=\"#/Image:What-Is-Double-Texting-Step-12.jpg\" class=\"image\"><picture
        id=\"e5fd6dce67abce931d620c1dcbc48ad1\"><source type=\"image/webp\" media=\"(max-width:
        728px)\" width=\"460\" height=\"546\" srcset=\"https://www.wikihow.com/images/thumb/d/df/What-Is-Double-Texting-Step-12.jpg/v4-460px-What-Is-Double-Texting-Step-12.jpg.webp
        460w\"></source><source type=\"image/jpeg\" media=\"(max-width: 728px)\" width=\"460\"
        height=\"546\" srcset=\"https://www.wikihow.com/images/thumb/d/df/What-Is-Double-Texting-Step-12.jpg/v4-460px-What-Is-Double-Texting-Step-12.jpg
        460w\"></source><source type=\"image/webp\" media=\"(min-width: 729px)\" width=\"728\"
        height=\"546\" srcset=\"/images/thumb/d/df/What-Is-Double-Texting-Step-12.jpg/v4-728px-What-Is-Double-Texting-Step-12.jpg.webp
        728w\"></source><source type=\"image/jpeg\" media=\"(min-width: 729px)\" width=\"728\"
        height=\"546\" srcset=\"/images/thumb/d/df/What-Is-Double-Texting-Step-12.jpg/v4-728px-What-Is-Double-Texting-Step-12.jpg
        728w\"></source><img alt=\"Step 1 Move on to a new topic when you text them
        again.\" src=\"https://www.wikihow.com/images/thumb/d/df/What-Is-Double-Texting-Step-12.jpg/v4-460px-What-Is-Double-Texting-Step-12.jpg\"
        decoding=\"async\" class=\"whcdn\" width=\"460\" height=\"345\" loading=\"lazy\"></picture><div
        class=\"image_details\"><script type=\"application/json\">{\"smallUrl\":\"https:\\/\\/www.wikihow.com\\/images\\/thumb\\/d\\/df\\/What-Is-Double-Texting-Step-12.jpg\\/v4-460px-What-Is-Double-Texting-Step-12.jpg\",\"bigUrl\":\"\\/images\\/thumb\\/d\\/df\\/What-Is-Double-Texting-Step-12.jpg\\/v4-728px-What-Is-Double-Texting-Step-12.jpg\",\"smallWidth\":460,\"smallHeight\":345,\"bigWidth\":728,\"bigHeight\":546,\"licensing\":\"<div
        class=\\\"mw-parser-output\\\"><p>\\u00a9 2026 wikiHow, Inc. All rights reserved.
        wikiHow, Inc. is the copyright holder of this image under U.S. and international
        copyright laws. This image may not be used by other entities without the express
        written consent of wikiHow, Inc.<br>\\n<\\/p><p><br \\/>\\n<\\/p><\\/div>\",\"zoomWidth\":728,\"zoomHeight\":546,\"zoomUrl\":\"\\/images\\/thumb\\/d\\/df\\/What-Is-Double-Texting-Step-12.jpg\\/v4-728px-What-Is-Double-Texting-Step-12.jpg.webp\"}</script></div></a></div>\n<div
        class=\"step_num\" aria-hidden=\"true\">1</div><div class=\"step\">\n<b class=\"whb\"
        aria-hidden=\"true\">Move on to a new topic when you text them again.</b>
        One reason the person didn\u2019t respond might be that they didn\u2019t feel
        like there was much to add to the conversation. Rather than chatting about
        the same subject or just letting the convo die out, <a href=\"/Double-Text-Without-Looking-Desperate\"
        title=\"Double Text Without Looking Desperate\">talk about something new</a>
        and exciting to keep the person engaged.\n<ul><li>Replying with a sarcastic
        response about why they didn\u2019t reply could sound a little mean since
        your tone can be hard to read.<sup id=\"_ref-11\" class=\"reference trusted\"
        aria-label=\"Link to Reference 11\"><a href=\"#_note-11\">[11]</a><span class=\"ts_popup
        trustedsource\" hidden id=\"ts_popup_11\" style=\"display: none;\">\n\t<span
        class=\"ts_close\">X</span>\n\t\t<a class=\"ts_trustworthy\" href=\"/wikiHow:Delivering-a-Trustworthy-Experience\">Expert
        Source</a>\n\n\t\t<span class=\"ts_name\"></span>\n\t\t\t<a class=\"ts_expert_link\"
        href=\"/Author/Christina-Jay-NLP\"><span class=\"ts_expert_image\"><picture><source
        type=\"image/webp\" srcset=\"/images/thumb/9/9a/Christina_Jay.png/-crop-100-100-100px-Christina_Jay.png.webp\"></source><img
        src=\"/images/thumb/9/9a/Christina_Jay.png/-crop-100-100-100px-Christina_Jay.png\"
        alt=\"Christina Jay, NLP\" loading=\"lazy\" width=\"30\" height=\"30\" style=\"max-width:
        30px\"></picture></span>Christina Jay, NLP<br><span class=\"ts_blurb\">Matchmaker
        &amp; Certified Life Coach</span></a>\n\n\t\t<span class=\"ts_description\">Expert
        Interview</span>\n\n</span>\n</sup>\n</li></ul>\n</div>\n<div class=\"clearall\"></div>\n<div
        class=\"scrolltomarker\" data-isstep=\"1\" id=\"scrollto_marker_steps_12\"></div>\n</li>\n<li
        id=\"step-id-412\">\n<a name=\"step_5_2\" class=\"stepanchor\"></a><div class=\"mwimg
        \ largeimage  floatcenter \"><a href=\"#/Image:What-Is-Double-Texting-Step-13.jpg\"
        class=\"image\"><picture id=\"01948952b51231d07fac53ed457f3e93\"><source type=\"image/webp\"
        media=\"(max-width: 728px)\" width=\"460\" height=\"546\" srcset=\"https://www.wikihow.com/images/thumb/e/e3/What-Is-Double-Texting-Step-13.jpg/v4-460px-What-Is-Double-Texting-Step-13.jpg.webp
        460w\"></source><source type=\"image/jpeg\" media=\"(max-width: 728px)\" width=\"460\"
        height=\"546\" srcset=\"https://www.wikihow.com/images/thumb/e/e3/What-Is-Double-Texting-Step-13.jpg/v4-460px-What-Is-Double-Texting-Step-13.jpg
        460w\"></source><source type=\"image/webp\" media=\"(min-width: 729px)\" width=\"728\"
        height=\"546\" srcset=\"/images/thumb/e/e3/What-Is-Double-Texting-Step-13.jpg/v4-728px-What-Is-Double-Texting-Step-13.jpg.webp
        728w\"></source><source type=\"image/jpeg\" media=\"(min-width: 729px)\" width=\"728\"
        height=\"546\" srcset=\"/images/thumb/e/e3/What-Is-Double-Texting-Step-13.jpg/v4-728px-What-Is-Double-Texting-Step-13.jpg
        728w\"></source><img alt=\"Step 2 Try restarting the conversation with a fun
        question.\" src=\"https://www.wikihow.com/images/thumb/e/e3/What-Is-Double-Texting-Step-13.jpg/v4-460px-What-Is-Double-Texting-Step-13.jpg\"
        decoding=\"async\" class=\"whcdn\" width=\"460\" height=\"345\" loading=\"lazy\"></picture><div
        class=\"image_details\"><script type=\"application/json\">{\"smallUrl\":\"https:\\/\\/www.wikihow.com\\/images\\/thumb\\/e\\/e3\\/What-Is-Double-Texting-Step-13.jpg\\/v4-460px-What-Is-Double-Texting-Step-13.jpg\",\"bigUrl\":\"\\/images\\/thumb\\/e\\/e3\\/What-Is-Double-Texting-Step-13.jpg\\/v4-728px-What-Is-Double-Texting-Step-13.jpg\",\"smallWidth\":460,\"smallHeight\":345,\"bigWidth\":728,\"bigHeight\":546,\"licensing\":\"<div
        class=\\\"mw-parser-output\\\"><p>\\u00a9 2026 wikiHow, Inc. All rights reserved.
        wikiHow, Inc. is the copyright holder of this image under U.S. and international
        copyright laws. This image may not be used by other entities without the express
        written consent of wikiHow, Inc.<br>\\n<\\/p><p><br \\/>\\n<\\/p><\\/div>\",\"zoomWidth\":728,\"zoomHeight\":546,\"zoomUrl\":\"\\/images\\/thumb\\/e\\/e3\\/What-Is-Double-Texting-Step-13.jpg\\/v4-728px-What-Is-Double-Texting-Step-13.jpg.webp\"}</script></div></a></div>\n<div
        class=\"step_num\" aria-hidden=\"true\">2</div><div class=\"step\">\n<b class=\"whb\"
        aria-hidden=\"true\">Try restarting the conversation with a fun question.</b>
        Posing a question encourages your crush or date to answer with more than a
        short sentence.  If you\u2019re still getting to know the person, try a classic
        \u201Cwould you rather\u201D icebreaker or a question about their interests.<sup
        id=\"_ref-12\" class=\"reference trusted\" aria-label=\"Link to Reference
        12\"><a href=\"#_note-12\">[12]</a><span class=\"ts_popup trustedsource\"
        hidden id=\"ts_popup_12\" style=\"display: none;\">\n\t<span class=\"ts_close\">X</span>\n\t\t<a
        class=\"ts_trustworthy\" href=\"/wikiHow:Delivering-a-Trustworthy-Experience\">Expert
        Source</a>\n\n\t\t<span class=\"ts_name\"></span>\n\t\t\t<a class=\"ts_expert_link\"
        href=\"/Author/Suzanna-Mathews\"><span class=\"ts_expert_image\"><picture><source
        type=\"image/webp\" srcset=\"/images/thumb/2/26/Suzanna_Mathews.png/-crop-100-100-100px-Suzanna_Mathews.png.webp\"></source><img
        src=\"/images/thumb/2/26/Suzanna_Mathews.png/-crop-100-100-100px-Suzanna_Mathews.png\"
        alt=\"Suzanna Mathews\" loading=\"lazy\" width=\"30\" height=\"30\" style=\"max-width:
        30px\"></picture></span>Suzanna Mathews<br><span class=\"ts_blurb\">Dating
        &amp; Relationship Coach</span></a>\n\n\t\t<span class=\"ts_description\">Expert
        Interview</span>\n\n</span>\n</sup> If you want to get to know your friend
        or S.O. on a deeper level, ask about the highlight of their day so you learn
        what excites them.<sup id=\"_ref-13\" class=\"reference trusted\" aria-label=\"Link
        to Reference 13\"><a href=\"#_note-13\">[13]</a><span class=\"ts_popup trustedsource\"
        hidden id=\"ts_popup_13\" style=\"display: none;\">\n\t<span class=\"ts_close\">X</span>\n\t\t<a
        class=\"ts_trustworthy\" href=\"/wikiHow:Delivering-a-Trustworthy-Experience\">Expert
        Source</a>\n\n\t\t<span class=\"ts_name\"></span>\n\t\t\t<a class=\"ts_expert_link\"
        href=\"/Author/Imad-Jbara\"><span class=\"ts_expert_image\"><picture><source
        type=\"image/webp\" srcset=\"/images/thumb/2/25/Imad_Jbara.png/-crop-100-100-93px-Imad_Jbara.png.webp\"></source><img
        src=\"/images/thumb/2/25/Imad_Jbara.png/-crop-100-100-93px-Imad_Jbara.png\"
        alt=\"Imad Jbara\" loading=\"lazy\" width=\"30\" height=\"30\" style=\"max-width:
        30px\"></picture></span>Imad Jbara<br><span class=\"ts_blurb\">Dating Coach</span></a>\n\n\t\t<span
        class=\"ts_description\">Expert Interview</span>\n\n</span>\n</sup>\n<ul>\n<li>\u201CHey
        quick question! Would you rather vacation for a week at the beach or in a
        quiet cabin on a lake?\u201D</li>\n<li>\u201CHi hi \U0001F604 How was that
        concert last night? I remember you were so excited to go\u201D</li>\n<li>\u201CHey
        you! Did you have anything exciting happen at work today?\u201D</li>\n</ul>\n</div>\n<div
        class=\"clearall\"></div>\n<div class=\"scrolltomarker\" data-isstep=\"1\"
        id=\"scrollto_marker_steps_13\"></div>\n</li>\n<li id=\"step-id-413\">\n<a
        name=\"step_5_3\" class=\"stepanchor\"></a><div class=\"mwimg  largeimage
