        data-testid=\"mesh-container-content\"><div id=\"comp-ledxbc9h\" class=\"ku3DBC
        zQ9jDz qvSjx3 Vq6kJx comp-ledxbc9h wixui-rich-text\" data-testid=\"richTextElement\"><h1
        class=\"font_0 wixui-rich-text__text\" style=\"font-size:33px;\"><span style=\"font-size:33px;\"
        class=\"wixui-rich-text__text\">The Three Angels Message</span></h1></div><div
        id=\"comp-ledxbc9k\" class=\"ku3DBC zQ9jDz qvSjx3 Vq6kJx comp-ledxbc9k wixui-rich-text\"
        data-testid=\"richTextElement\"><p class=\"font_8 wixui-rich-text__text\"
        style=\"font-size:17px;\">The Three Angels Message is a central doctrine of
        the Seventh-day Adventist Church. It is based on three messages found in the
        book of Revelation, chapter 14, which are believed to be a warning and call
        to prepare for the return of Jesus Christ.</p>\n\n<p class=\"font_8 wixui-rich-text__text\"
        style=\"font-size:17px;\"><span class=\"wixGuard wixui-rich-text__text\">\u200B</span></p>\n\n<h2
        class=\"font_2 wixui-rich-text__text\" style=\"font-size:20px;\"><span style=\"font-size:20px;\"
        class=\"wixui-rich-text__text\">The First Angel</span></h2>\n\n<p class=\"font_8
        wixui-rich-text__text\" style=\"font-size:17px;\"><span class=\"wixGuard wixui-rich-text__text\">\u200B</span></p>\n\n<p
        class=\"font_8 wixui-rich-text__text\" style=\"font-size:17px;\">The first
        angel&#39;s message is found in Revelation 14:6-7 and reads, &quot;Then I
        saw another angel flying in the midst of heaven, having the everlasting gospel
        to preach to those who dwell on the earth&mdash;to every nation, tribe, tongue,
        and people&mdash;saying with a loud voice, &#39;Fear God and give glory to
        Him, for the hour of His judgment has come; and worship Him who made heaven
        and earth, the sea and springs of water.&#39;&quot; The message calls for
        people to worship God, recognize His authority, and prepare for His judgment.</p>\n\n<p
        class=\"font_8 wixui-rich-text__text\" style=\"font-size:17px;\"><span class=\"wixGuard
        wixui-rich-text__text\">\u200B</span></p>\n\n<h2 class=\"font_2 wixui-rich-text__text\"
        style=\"font-size:20px;\"><span style=\"font-size:20px;\" class=\"wixui-rich-text__text\">The
        Second Angel</span></h2>\n\n<p class=\"font_8 wixui-rich-text__text\" style=\"font-size:17px;\"><span
        class=\"wixGuard wixui-rich-text__text\">\u200B</span></p>\n\n<p class=\"font_8
        wixui-rich-text__text\" style=\"font-size:17px;\">The second angel&#39;s message
        is found in Revelation 14:8 and reads, &quot;And another angel followed, saying,
        &#39;Babylon is fallen, is fallen, that great city, because she has made all
        nations drink of the wine of the wrath of her fornication.&#39;&quot; The
        message warns against the dangers of apostasy and the worship of false gods,
        which Adventists believe can be found in many religions and belief systems.</p>\n\n<p
        class=\"font_8 wixui-rich-text__text\" style=\"font-size:17px;\"><span class=\"wixGuard
        wixui-rich-text__text\">\u200B</span></p>\n\n<h2 class=\"font_2 wixui-rich-text__text\"
        style=\"font-size:20px;\"><span style=\"font-size:20px;\" class=\"wixui-rich-text__text\">The
        Third Angel</span></h2>\n\n<p class=\"font_8 wixui-rich-text__text\" style=\"font-size:17px;\"><span
        class=\"wixGuard wixui-rich-text__text\">\u200B</span></p>\n\n<p class=\"font_8
        wixui-rich-text__text\" style=\"font-size:17px;\">The third angel&#39;s message
        is found in Revelation 14:9-12 and reads, &quot;Then a third angel followed
        them, saying with a loud voice, &#39;If anyone worships the beast and his
        image, and receives his mark on his forehead or on his hand, he himself shall
        also drink of the wine of the wrath of God, which is poured out full strength
        into the cup of His indignation. He shall be tormented with fire and brimstone
        in the presence of the holy angels and in the presence of the Lamb. And the
        smoke of their torment ascends forever and ever; and they have no rest day
        or night, who worship the beast and his image, and whoever receives the mark
        of his name.&#39; Here is the patience of the saints; here are those who keep
        the commandments of God and the faith of Jesus.&quot; The message warns against
        worshipping the beast, which Adventists interpret as representing any power
        or authority that opposes God, and urges believers to remain faithful and
        obedient to God&#39;s commandments.<span class=\"wixGuard wixui-rich-text__text\">\u200B</span></p></div><div
        id=\"comp-leeg9lx4\" class=\"MazNVa comp-leeg9lx4 wixui-image\"><div data-testid=\"linkElement\"
        class=\"j7pOnl\"><img fetchpriority=\"high\" sizes=\"325px\" srcSet=\"https://static.wixstatic.com/media/c61fcc_6597ec00bef843879c969c3f969dedc3~mv2.png/v1/fill/w_325,h_325,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/three-angels-message.png
        1x, https://static.wixstatic.com/media/c61fcc_6597ec00bef843879c969c3f969dedc3~mv2.png/v1/fill/w_650,h_650,al_c,q_90,usm_0.66_1.00_0.01,enc_avif,quality_auto/three-angels-message.png
        2x\" id=\"img_comp-leeg9lx4\" src=\"https://static.wixstatic.com/media/c61fcc_6597ec00bef843879c969c3f969dedc3~mv2.png/v1/fill/w_325,h_325,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/three-angels-message.png\"
        alt=\"three-angels-message.png\" style=\"object-fit:cover\" class=\"BI8PVQ
        Tj01hh\" width=\"325\" height=\"325\"/></div></div><div id=\"comp-leegbo4w\"
        class=\"ku3DBC zQ9jDz qvSjx3 Vq6kJx comp-leegbo4w wixui-rich-text\" data-testid=\"richTextElement\"><h2
        class=\"font_2 wixui-rich-text__text\" style=\"font-size:20px;\"><span style=\"font-size:20px;\"
        class=\"wixui-rich-text__text\">Preparation For Christ&#39;s Return</span></h2>\n\n<p
        class=\"font_8 wixui-rich-text__text\" style=\"font-size:20px;\"><span style=\"font-size:20px;\"
        class=\"wixui-rich-text__text\"><span class=\"wixGuard wixui-rich-text__text\">\u200B</span></span></p>\n\n<p
        class=\"font_8 wixui-rich-text__text\" style=\"font-size:20px;\"><span style=\"font-size:20px;\"
        class=\"wixui-rich-text__text\">Seventh-day Adventists believe that the Three
        Angels Message is a call to prepare for the return of Jesus Christ. We view
        it as a message of hope and salvation, and believe that those who heed the
        message will be saved when Christ returns. As Adventists we often share the
        Three Angels Message with others through literature evangelism, public meetings,
        and other forms of <span style=\"color:#3D9BE9;\" class=\"wixui-rich-text__text\"><a
        href=\"https://www.hemetsda.org/community-services\" target=\"_self\" class=\"wixui-rich-text__text\">outreach</a></span>.
        We also believe that the message is particularly relevant to the modern world,
        as we see signs of the fulfillment of the prophecies in the book of Revelation
        in current events and world conditions.</span></p>\n\n<h2 class=\"font_2 wixui-rich-text__text\"
        style=\"font-size:20px;\"><span style=\"font-size:20px;\" class=\"wixui-rich-text__text\"><span
        class=\"wixGuard wixui-rich-text__text\">\u200B</span></span></h2>\n\n<h2
        class=\"font_2 wixui-rich-text__text\" style=\"font-size:20px;\"><span style=\"font-size:20px;\"
        class=\"wixui-rich-text__text\">The Three Angels Message Conclusion</span></h2>\n\n<p
        class=\"font_8 wixui-rich-text__text\" style=\"font-size:20px;\"><span style=\"font-size:20px;\"
        class=\"wixui-rich-text__text\"><span class=\"wixGuard wixui-rich-text__text\">\u200B</span></span></p>\n\n<p
        class=\"font_8 wixui-rich-text__text\" style=\"font-size:20px;\"><span style=\"font-size:20px;\"
        class=\"wixui-rich-text__text\">Three Angels Message is a central doctrine
        of the Seventh-day Adventist Church, based on three messages found in the
        book of Revelation. Adventists believe that the message is a warning and call
        to prepare for the return of Jesus Christ, and see it as particularly relevant
        to the modern world. The Three Angels Message is often shared with others
        through outreach and evangelism, and is seen as a message of hope and salvation.</span></p></div></div></div></section></div></div></div></div></div></div></div></main><div
