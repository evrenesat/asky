        class=\"step_num\" aria-hidden=\"true\">1</div><div class=\"step\">\n<b class=\"whb\"
        aria-hidden=\"true\">Put your phone away.</b> Checking your phone every few
        minutes will only make you feel antsier as you wait, so try to take a breath
        and relax. Put your phone on silent and set it in a drawer or under a pillow
        to take it off of your mind. Do an activity in a different room for a little
        while before coming back and checking on your messages.<sup id=\"_ref-4\"
        class=\"reference\" aria-label=\"Link to Reference 4\"><a href=\"#_note-4\">[4]</a><span
        class=\"ts_popup \" hidden id=\"ts_popup_4\" style=\"display: none;\">\n\t<span
        class=\"ts_close\">X</span>\n\t\t<span class=\"ts_name\">Research source</span>\n\t\t<span
