        text-decoration:none; } .u4ea5b74e74b0e8b29af5a7051108f09d:active, .u4ea5b74e74b0e8b29af5a7051108f09d:hover
        { opacity: 1; transition: opacity 250ms; webkit-transition: opacity 250ms;
