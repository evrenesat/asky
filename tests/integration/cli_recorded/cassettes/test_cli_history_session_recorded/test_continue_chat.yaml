        mntl-sc-block-callout mntl-block theme-key-takeaway theme-key-takeaway\" data-tracking-id=\"mntl-sc-block-callout\"
        data-tracking-container=\"true\"><h3 id=\"mntl-sc-block-callout-heading_1-0\"
        class=\"comp mntl-sc-block-callout-heading mntl-text-block\">Key Takeaways</h3>\n<div
        id=\"mntl-sc-block-callout-body_1-0\" class=\"comp mntl-sc-block-callout-body
        mntl-text-block expert-content\"><ul><li>Double texting can be acceptable
        if you&#39;re following up on something urgent or time-sensitive.</li><li>It&#39;s
        okay to double text if you need to add important details you forgot to mention
        in your first message.</li><li>Be careful not to double text out of anxiety
        or insecurity, as it can come off as needy or desperate.</li></ul></div></div>\n<p
        id=\"mntl-sc-block_2-0\" class=\"comp mntl-sc-block mntl-sc-block-html\">
        So, you sent a <a href=\"https://www.verywellmind.com/understanding-the-dynamics-of-texting-in-relationships-4769077\"
        data-component=\"link\" data-source=\"inlineLink\" data-type=\"internalLink\"
        data-ordinal=\"1\">text</a>. No response. It's fine, no worries. It\u2019s
        only been\u2026checks time\u2026three hours and five minutes. Now you\u2019re
        stuck in the ultimate dilemma: Should you send a follow-up? Or should you
        try to play it cool? Will a double text make you look eager? <a href=\"https://www.verywellmind.com/how-to-avoid-being-clingy-in-relationships-5181502\"
        data-component=\"link\" data-source=\"inlineLink\" data-type=\"internalLink\"
        data-ordinal=\"2\">Clingy</a>? Or worse, desperate?\n</p>\n<div id=\"mntl-sc-block_3-0\"
        class=\"comp mntl-sc-block mntl-sc-block-adslot mntl-block\"></div>\n<p id=\"mntl-sc-block_4-0\"
        class=\"comp mntl-sc-block mntl-sc-block-html\"> We know the feeling, we\u2019ve
        definitely been there. Before you panic-text something like \u201Chaha guess
        you hate me now\u201D (please don\u2019t), let\u2019s break down the dos and
        don\u2019ts of double texting.\n</p>\n<div id=\"mntl-sc-block_5-0\" class=\"comp
        mntl-sc-block mntl-sc-block-adslot mntl-block\"></div>\n<span class=\"heading-toc\"
        id=\"toc-what-is-double-texting-exactly\"></span><h2 id=\"mntl-sc-block_6-0\"
        class=\"comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading\">
        <span class=\"mntl-sc-block-heading__text text-title-300\"> What Is Double
        Texting, Exactly? </span> </h2>\n<p id=\"mntl-sc-block_7-0\" class=\"comp
        mntl-sc-block mntl-sc-block-html\"> Double texting is when we send someone
        a second (or sometimes even a third, fourth, or fifth) text message before
        they&#39;ve replied to our previous one. It\u2019s the digital equivalent
        of saying \u201CHey\u2026 you there?\u201D when someone leaves us hanging.\n</p>\n<div
        id=\"mntl-sc-block_8-0\" class=\"comp mntl-sc-block mntl-sc-block-adslot mntl-block\"></div>\n<h3
        id=\"mntl-sc-block_10-0\" class=\"comp mntl-sc-block mntl-sc-block-subheading\">
        <span class=\"mntl-sc-block-subheading__text\"> Examples of Double Texting
        </span> </h3>\n<p id=\"mntl-sc-block_11-0\" class=\"comp mntl-sc-block mntl-sc-block-html\">
        These are some examples of double texting:\n</p>\n<div id=\"mntl-sc-block_12-0\"
        class=\"comp mntl-sc-block mntl-sc-block-adslot mntl-block\"></div>\n<ul id=\"mntl-sc-block_13-0\"
        class=\"comp mntl-sc-block mntl-sc-block-html\">\n<li>Playful nudge: \u201CJust
        checking in!\u201D</li>\n<li>Direct question: \"Did you get my last message?\"</li>\n<li>Confirming
        plans: \u201CHey, just making sure we\u2019re still on for later!\u201D</li>\n<li>Adding
        to a previous thought: \"Oh, and I forgot to mention, tonight\u2019s restaurant
        also has a live band.\u201D</li>\n<li>Time-sensitive follow-up: \"Hey, just
        wanted to make sure you saw my message about the concert tickets before they
        sell out!\"</li>\n<li>Introducing a new conversation topic: \u201CI just had
        the <a href=\"https://www.verywellmind.com/how-to-make-your-mondays-better-8599105\"
        data-component=\"link\" data-source=\"inlineLink\" data-type=\"internalLink\"
        data-ordinal=\"1\">worst Monday</a>.\u201D</li>\n<li>Excited overshare: \u201COmg,
        I just saw something that reminded me of you!\u201D</li>\n<li>Playing it cool:
        [Sending a double text disguised as a meme]</li>\n<li>Passive-aggressive poke:
        \u201CGuess you\u2019re busy.\u201D</li>\n<li>Argumentative mood: \u201CWhy
        are you ignoring me?\u201D</li>\n<li>Impatient annoyance: \u201C???\u201D</li>\n<li>Emotional
        response: \"I'm really upset that you haven't replied. What's going on?\"</li>\n<li>Stream
        of multiple messages: \u201CWhy aren\u2019t you responding to me? Do you hate
        me? Am I not good enough for you? Screw you. Just kidding, I didn\u2019t mean
        that.\u201D</li>\n</ul>\n<div id=\"mntl-sc-block_14-0\" class=\"comp mntl-sc-block
        mntl-sc-block-adslot mntl-block\"></div>\n<div id=\"mntl-sc-block_15-0\" class=\"comp
        mntl-sc-block health-sc-block-digiohembed mntl-block\"><div id=\"mntl-sc-block-digiohembed_1-0\"
        class=\"comp mntl-sc-block-digiohembed\"> <div\nid=\"lightbox-inline-form-d6b1ce8f-ffcf-49f7-9130-c9a0962426b2\"\nclass=\"mntl-sc-block-digiohembed__container
        digioh-inline-unit digioh-inline-unit--sc\"\ndata-guid=\"lightbox-inline-form-d6b1ce8f-ffcf-49f7-9130-c9a0962426b2\"\ndata-title=\"\"\n>\n</div>\n</div></div>\n<div
        id=\"mntl-sc-block_16-0\" class=\"comp mntl-sc-block mntl-sc-block-adslot
        mntl-block\"></div>\n<div id=\"health-sc-block-featuredlink--related_1-0\"
        class=\"comp health-sc-block-featuredlink--related health-sc-block-featuredlink-base
        mntl-sc-block-featuredlink mntl-block related-link related-link freemarker.template.FalseTemplateBooleanModel@3a23a284
        theme-related\"><a\nhref=\"https://www.verywellmind.com/what-to-text-after-the-first-date-and-when-8788482\"\nrel=\"nocaes\"\nid=\"mntl-sc-block-featuredlink__link_1-0\"\nclass=\"mntl-sc-block-featuredlink__link
        mntl-text-link \"\ndata-tracking-container=\"true\"\ndata-tracking-id=\"featured-link\"\n><span
        class=\"link__wrapper\">The Art of Texting After a First Date: What to Say
        and When to Say It </span></a></div>\n<div id=\"mntl-sc-block_18-0\" class=\"comp
        mntl-sc-block mntl-sc-block-adslot mntl-block\"></div>\n<span class=\"heading-toc\"
        id=\"toc-why-do-we-do-it\"></span><h2 id=\"mntl-sc-block_19-0\" class=\"comp
        mntl-sc-block health-sc-block-heading mntl-sc-block-heading\"> <span class=\"mntl-sc-block-heading__text
        text-title-300\"> Why Do We Do It? </span> </h2>\n<p id=\"mntl-sc-block_20-0\"
        class=\"comp mntl-sc-block mntl-sc-block-html\"> We double text for a lot
        of reasons. While some are totally valid, others are driven purely by anxiety.
        Double texting can be a <a href=\"https://www.verywellmind.com/10-red-flags-in-relationships-5194592\"
        data-component=\"link\" data-source=\"inlineLink\" data-type=\"internalLink\"
        data-ordinal=\"1\">red flag</a> if it\u2019s motivated by the wrong reasons,
        says <a href=\"https://www.adhdadvisor.org/adhd/online-adhd-diagnosis#tatiana-rivera-cruz\"
        data-component=\"link\" data-source=\"inlineLink\" data-type=\"externalLink\"
        data-ordinal=\"2\" rel=\"nofollow\">Tatiana Rivera Cruz</a>, MSW, LCSW, a
        therapist at ADHDAdvisor.\n</p>\n<div id=\"mntl-sc-block_21-0\" class=\"comp
        mntl-sc-block mntl-sc-block-adslot mntl-block\"></div>\n<p id=\"mntl-sc-block_22-0\"
        class=\"comp mntl-sc-block mntl-sc-block-html\"> Some of the reasons for double
        texting might include:\n</p>\n<div id=\"mntl-sc-block_23-0\" class=\"comp
        mntl-sc-block mntl-sc-block-adslot mntl-block\"></div>\n<ul id=\"mntl-sc-block_24-0\"
        class=\"comp mntl-sc-block mntl-sc-block-html\">\n<li><strong>Following up
        on something urgent: </strong>Sometimes, a follow-up is just practical. If
        we\u2019re making plans, waiting on important info, or dealing with time-sensitive
        stuff, a double text makes sense.</li>\n<li><strong>Checking if they saw our
        message:</strong> Maybe they got distracted, their phone died, or the message
        got buried under a sea of notifications. A quick \u201CHey, just checking
        if you saw this\u201D feels reasonable after some time has passed.</li>\n<li><strong>Clarifying
        something:</strong> If we think our first message might have been unclear
        or misunderstood, we might send a second text to clarify our point.</li>\n<li><strong>Adding
        a forgotten detail:</strong> If we\u2019ve sent a text and then realized we
        forgot to mention something, we may send a second text as an add-on. \u201COh,
        and by the way, bring a jacket\u2014it\u2019s freezing!\u201D</li>\n<li><strong>Feeling
        anxious:</strong> Let\u2019s be real\u2014sometimes we spiral. If we don\u2019t
        get a response, our brain starts running wild: <em>Did I say something weird?
        Are they mad? Are they ghosting me?</em> And before we know it, we\u2019re
        typing out a second message to soothe our <a href=\"https://www.verywellmind.com/learning-how-to-cope-with-relationship-anxiety-5186885\"
        data-component=\"link\" data-source=\"inlineLink\" data-type=\"internalLink\"
        data-ordinal=\"1\">anxiety</a> and get reassurance, says <a href=\"https://drsabrinaromanoff.com/\"
        data-component=\"link\" data-source=\"inlineLink\" data-type=\"externalLink\"
        data-ordinal=\"2\">Sabrina Romanoff,</a> PsyD, a clinical psychologist.</li><span
        class=\"mntl-sc-block-adslot mntl-sc-block-adslot-inline\"></span>\n<li><strong>Sharing
        excitement: </strong>Sometimes, double texting isn\u2019t about panic\u2014it\u2019s
        about enthusiasm. We might be so genuinely excited to share something that
        we can't wait to share it, even if the other person hasn't responded to our
        previous message.</li>\n<li><strong>Wanting to keep the conversation going:
        </strong>Maybe the <a href=\"https://www.verywellmind.com/conversation-starters-to-prevent-awkward-silences-8685317\"
        data-component=\"link\" data-source=\"inlineLink\" data-type=\"internalLink\"
        data-ordinal=\"3\">conversation was dying</a>, and we\u2019re not ready to
        let it go. A follow-up text (especially something fun or lighthearted) can
        be our way of trying to revive it.</li>\n<li><strong>Being insecure:</strong>
        If we\u2019re feeling unsure about where we stand with someone\u2014whether
        it\u2019s a crush, a friend, or even a work contact\u2014we might double text
        as a way to seek validation.<span data-cite=\"2\" class=\"inline-citation-node\"></span></li>\n</ul>\n<div
        id=\"mntl-sc-block_25-0\" class=\"comp mntl-sc-block mntl-sc-block-adslot
        mntl-block\"></div>\n<div id=\"health-sc-block-featuredlink--related_2-0\"
        class=\"comp health-sc-block-featuredlink--related health-sc-block-featuredlink-base
        mntl-sc-block-featuredlink mntl-block related-link related-link freemarker.template.FalseTemplateBooleanModel@3a23a284
        theme-related\"><a\nhref=\"https://www.verywellmind.com/how-to-keep-a-conversation-going-8637987\"\nrel=\"nocaes\"\nid=\"mntl-sc-block-featuredlink__link_2-0\"\nclass=\"mntl-sc-block-featuredlink__link
        mntl-text-link \"\ndata-tracking-container=\"true\"\ndata-tracking-id=\"featured-link\"\n><span
        class=\"link__wrapper\">How to Keep a Conversation Going: Strategies That
        Actually Work</span></a></div>\n<div id=\"mntl-sc-block_27-0\" class=\"comp
        mntl-sc-block mntl-sc-block-adslot mntl-block\"></div>\n<span class=\"heading-toc\"
        id=\"toc-when-is-double-texting-appropriate\"></span><h2 id=\"mntl-sc-block_28-0\"
        class=\"comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading\">
        <span class=\"mntl-sc-block-heading__text text-title-300\"> When Is Double
        Texting Appropriate? </span> </h2>\n<p id=\"mntl-sc-block_29-0\" class=\"comp
        mntl-sc-block mntl-sc-block-html\"> Double texting is totally fine in certain
        situations\u2014it\u2019s all about context, timing, and tone. Here are some
        cases where it\u2019s appropriate:\n</p>\n<div id=\"mntl-sc-block_30-0\" class=\"comp
        mntl-sc-block mntl-sc-block-adslot mntl-block\"></div>\n<ul id=\"mntl-sc-block_31-0\"
        class=\"comp mntl-sc-block mntl-sc-block-html\">\n<li><strong>When you\u2019re
        apologizing: </strong>If you realize you sent a message at an inappropriate
        time or said something insensitive, it's acceptable to send a follow-up message
        to <a class=\"recommendation-inline-link\" href=\"https://www.verywellmind.com/how-to-apologize-more-sincerely-3144467\"
        data-component=\"link\" data-source=\"inlineLink\" data-type=\"internalLink\"
        data-ordinal=\"1\" rel=\"noopener noreferrer\">apologize</a>.</li>\n<li><strong>When
        it\u2019s time-sensitive: </strong>If you\u2019re coordinating plans, confirming
        an appointment, or dealing with something urgent, a follow-up makes sense.</li>\n<li><strong>When
        you forgot to include important information:</strong> If your first text didn\u2019t
        include key details, sending another one is totally normal.&nbsp;</li>\n<li><strong>When
        the conversation naturally calls for it:</strong> If the person you\u2019re
        texting responds with a reaction or a short answer (like \"haha\" or \"lol\"),
        sending another text to keep the conversation going is fine.</li>\n<li><strong>When
        you have a close relationship with the person: </strong>Friends, partners,
        and family members usually won\u2019t mind a second text\u2014especially if
        it's playful or meaningful.&nbsp;</li>\n<li><strong>When it\u2019s been a
        reasonable amount of time: </strong>If it\u2019s been a full day (or more)
        and you still haven\u2019t heard back, it\u2019s okay to check in\u2014especially
        if it\u2019s someone you regularly talk to.</li>\n</ul>\n<div id=\"mntl-sc-block_32-0\"
        class=\"comp mntl-sc-block mntl-sc-block-adslot mntl-block\"></div>\n<p id=\"mntl-sc-block_33-0\"
        class=\"comp mntl-sc-block mntl-sc-block-html\"> Even in these situations,
        it&#39;s important to be mindful of the other person&#39;s time and avoid
        coming across as pushy or demanding. The key is not to overdo it\u2014one
        follow-up is usually enough. If they still don\u2019t reply, it might be best
        to leave it alone.\n</p>\n<div id=\"mntl-sc-block_34-0\" class=\"comp mntl-sc-block
        mntl-sc-block-adslot mntl-block\"></div>\n<span class=\"heading-toc\" id=\"toc-when-to-avoid-double-texting\"></span><h2
        id=\"mntl-sc-block_35-0\" class=\"comp mntl-sc-block health-sc-block-heading
        mntl-sc-block-heading\"> <span class=\"mntl-sc-block-heading__text text-title-300\">
        When to Avoid Double Texting? </span> </h2>\n<p id=\"mntl-sc-block_36-0\"
        class=\"comp mntl-sc-block mntl-sc-block-html\"> Double texting isn\u2019t
        always a great idea\u2014sometimes, it can come off as pushy or even a little
        needy. Here are some situations where you should probably hold off:\n</p>\n<div
        id=\"mntl-sc-block_37-0\" class=\"comp mntl-sc-block mntl-sc-block-adslot
        mntl-block\"></div>\n<ul id=\"mntl-sc-block_38-0\" class=\"comp mntl-sc-block
        mntl-sc-block-html\">\n<li><strong>When you know they\u2019re busy: </strong>Not
        everyone can text back immediately. If you know the person is at work or busy,
        resist the urge to double text.</li>\n<li><strong>When it\u2019s only been
        a short while:</strong> If it\u2019s only been a few minutes or even an hour
        since your previous message, give them a little space before following up.</li>\n<li><strong>When
        it\u2019s a new acquaintance: </strong>In the initial stages of <a href=\"https://www.verywellmind.com/questions-to-get-to-know-someone-better-7111213\"
        data-component=\"link\" data-source=\"inlineLink\" data-type=\"internalLink\"
        data-ordinal=\"1\">getting to know someone</a>, double texting can be a turn-off.
        It might make you seem overly eager or anxious. Give the other person time
        to respond and don't bombard them with messages so much that they get <a href=\"https://www.verywellmind.com/why-we-get-the-ick-according-to-therapists-7501527\"
        data-component=\"link\" data-source=\"inlineLink\" data-type=\"internalLink\"
        data-ordinal=\"2\">the ick</a>.</li>\n<li><strong>When they\u2019re not reciprocating
        interest: </strong>If someone consistently takes forever to reply, gives one-word
        answers, or just leaves you on read, they might not be interested in talking.
        Sending another text won\u2019t change that\u2014it\u2019ll just make things
        awkward.</li>\n<li><strong>When you\u2019re feeling anxious: </strong>If you\u2019re
        double texting just to get reassurance (Why haven\u2019t they replied? Did
        I say something wrong?), take a step back. Give it time before assuming the
        worst and firing off a bunch of messages.</li><span class=\"mntl-sc-block-adslot
        mntl-sc-block-adslot-inline\"></span>\n<li><strong>When it\u2019s an argument
        or a serious conversation:</strong> If you\u2019re waiting on a response in
        a tense situation, double texting can come across as pressuring or even aggressive.
        Let the person process and respond on their own time.</li>\n<li><strong>When
        they\u2019ve already seen your message:</strong> If your message is marked
        as \u201Cread\u201D and they haven\u2019t replied, they\u2019re probably choosing
        not to respond yet. Or, if they\u2019re ghosting you, they may cut off all
        communication.<span data-cite=\"1\" class=\"inline-citation-node\"></span>
        Sending another text won\u2019t help.</li>\n<li><strong>When the conversation
        has ended:</strong> If you've already said your goodbyes or the conversation
        has naturally ended, there's no need to send another text right away. It can
        seem like you're trying to drag the conversation on unnecessarily.</li>\n<li><strong>When
        you\u2019ve already sent multiple unanswered texts: </strong>One follow-up
        is fine. Two, maybe. But if you\u2019re sending the third or fourth message
        with no response, it\u2019s time to step away.</li>\n<li><strong>When it\u2019s
        late at night: </strong>Texting someone late at night, especially if they
        didn\u2019t answer you earlier, can feel intrusive or desperate. If it\u2019s
        not urgent, just wait until the next day.</li>\n</ul>\n<div id=\"mntl-sc-block_39-0\"
        class=\"comp mntl-sc-block mntl-sc-block-adslot mntl-block\"></div>\n<span
        class=\"heading-toc\" id=\"toc-the-negative-consequences-of-double-texting\"></span><h2
        id=\"mntl-sc-block_40-0\" class=\"comp mntl-sc-block health-sc-block-heading
        mntl-sc-block-heading\"> <span class=\"mntl-sc-block-heading__text text-title-300\">
        The Negative Consequences of Double Texting </span> </h2>\n<p id=\"mntl-sc-block_41-0\"
        class=\"comp mntl-sc-block mntl-sc-block-html\"> Double texting isn\u2019t
        always a bad thing, but it can backfire if it&#39;s overdone. Here are some
        potential negative consequences to keep in mind:\n</p>\n<div id=\"mntl-sc-block_42-0\"
        class=\"comp mntl-sc-block mntl-sc-block-adslot mntl-block\"></div>\n<ul id=\"mntl-sc-block_43-0\"
        class=\"comp mntl-sc-block mntl-sc-block-html\">\n<li><strong>Looking desperate:</strong>
        Double texting can come off as needy, clingy, and anxious, says Dr. Romanoff.
        \u201CPeople intuitively can feel the emotions of those around them, and if
        your texting is motivated by anxiety, the other person likely can feel it.\u201D</li>\n<li><strong>Pushing
        people away:</strong> If someone needs space or isn\u2019t in the mood to
        talk, a second message can feel pushy. \u201CThe more you push, the more the
        other person is likely to pull away, feel overwhelmed, and be less likely
        to give,\u201D Dr. Romanoff explains.</li>\n<li><strong>Appearing impatient:</strong>
        Some people just take longer to respond\u2014whether it\u2019s because they\u2019re
        busy, not glued to their phone, or simply taking their time. If you double
        text too soon, it can make you seem demanding.</li>\n<li><strong>Coming across
        as passive-aggressive:</strong> Certain types of double texts\u2014like \u201C???\u201D
        or \u201CGuess you\u2019re busy\u201D\u2014can come off as <a href=\"https://www.verywellmind.com/what-is-passive-aggressive-behavior-2795481\"
        data-component=\"link\" data-source=\"inlineLink\" data-type=\"internalLink\"
        data-ordinal=\"1\">passive-aggressive</a>, even if you don\u2019t mean them
        that way.</li>\n<li><strong>Creating misunderstandings: </strong>Without the
        context of body language or tone of voice, your message may be misconstrued.
        This can lead to unnecessary conflict or hurt feelings.</li><span class=\"mntl-sc-block-adslot
        mntl-sc-block-adslot-inline\"></span>\n<li><strong>Lowering your perceived
        value: </strong>Constantly initiating contact can make you seem like you have
        nothing else going on in your life and lower your perceived value.</li>\n<li><strong>Signaling
        imbalance: </strong>If you\u2019re double texting, you likely are also putting
        more into the relationship than the other person, says Dr. Romanoff. \u201CThis
        is a tangible representation of a <a href=\"https://www.verywellmind.com/one-sided-relationship-signs-causes-effects-coping-5216120\"
        data-component=\"link\" data-source=\"inlineLink\" data-type=\"internalLink\"
        data-ordinal=\"2\">one-sided relationship</a>.\u201D</li>\n</ul>\n<div id=\"mntl-sc-block_44-0\"
        class=\"comp mntl-sc-block mntl-sc-block-adslot mntl-block\"></div>\n<div
        id=\"health-sc-block-featuredquote--none_1-0\" class=\"comp health-sc-block-featuredquote--none
        health-sc-block-featuredquote-base mntl-sc-block-featuredquote theme-none\">\n<div
        class=\"mntl-sc-block-featuredquote__quote-wrapper\">\n<div class=\"mntl-sc-block-featuredquote__quote\">\n<p>People
        tend to double text to receive more from the other person, but paradoxically,
        it only pushes them further away.</p>\n</div>\n<div class=\"mntl-sc-block-featuredquote__credit-wrapper\">\n<div
        class=\"mntl-sc-block-featuredquote__credit\">\n<span> \u2014 </span>\n<span>SABRINA
        ROMANOFF, PSYD</span>\n</div>\n</div>\n</div>\n</div>\n<div id=\"mntl-sc-block_46-0\"
        class=\"comp mntl-sc-block mntl-sc-block-adslot mntl-block\"></div>\n<p id=\"mntl-sc-block_47-0\"
        class=\"comp mntl-sc-block mntl-sc-block-html\"> Ultimately double texting
        is problematic because you\u2019ll never know what the other person would
        do without your prompting, says Dr. Romanoff.\_\n</p>\n<div id=\"mntl-sc-block_48-0\"
        class=\"comp mntl-sc-block mntl-sc-block-adslot mntl-block\"></div>\n<p id=\"mntl-sc-block_49-0\"
        class=\"comp mntl-sc-block mntl-sc-block-html\"> She explains that if you
        hold on and avoid sending the second text, one of two things could happen:
        First, the person never texts back, providing a definitive answer of how they
        feel about you, which saves you from wasting any further time or energy on
        them, or second, they do respond on their terms, which also lets you know
        how they genuinely feel about you, without any prodding on your part.\n</p>\n<div
        id=\"mntl-sc-block_50-0\" class=\"comp mntl-sc-block mntl-sc-block-adslot
        mntl-block\"></div>\n<span class=\"heading-toc\" id=\"toc-how-to-double-text-considerately\"></span><h2
        id=\"mntl-sc-block_51-0\" class=\"comp mntl-sc-block health-sc-block-heading
        mntl-sc-block-heading\"> <span class=\"mntl-sc-block-heading__text text-title-300\">
        How to Double Text Considerately </span> </h2>\n<p id=\"mntl-sc-block_52-0\"
        class=\"comp mntl-sc-block mntl-sc-block-html\"> Double texting can be totally
        fine if it\u2019s done considerately. Here\u2019s how to double text without
        coming off as pushy, impatient, or needy:\n</p>\n<div id=\"mntl-sc-block_53-0\"
        class=\"comp mntl-sc-block mntl-sc-block-adslot mntl-block\"></div>\n<ul id=\"mntl-sc-block_54-0\"
        class=\"comp mntl-sc-block mntl-sc-block-html\">\n<li><strong>Give it some
        time:</strong> Before sending a second message, pause and ask yourself whether
        you have given them enough time to respond. People get busy, distracted, or
        simply don\u2019t have the mental energy to text back right away. Unless it\u2019s
        urgent, waiting a few hours, or even a day, shows patience.</li>\n<li><strong>Keep
        it casual and friendly: </strong>Your follow-up should feel light, not like
        you\u2019re pressuring them. A relaxed tone makes the message more inviting
        and less like an obligation. Try \u201CHey! Just following up in case my last
        message got lost in the void. No rush!\u201D instead of \u201CWow, I guess
        you\u2019re too busy to answer me.\u201D</li>\n<li><strong>Make it quick:
        </strong>Get straight to the point. Avoid lengthy explanations or rambling
        messages. Definitely don\u2019t send multiple follow-up texts in quick succession.</li>\n<li><strong>Highlight
        any urgency: </strong>if there\u2019s an actual deadline, say so. This keeps
        your double text from seeming like a desperate move, and more of a logistical
        issue. For example, you could say \u201CHey! Just confirming our dinner plans
        tonight\u2014let me know so I can make a reservation.\u201D</li><span class=\"mntl-sc-block-adslot
        mntl-sc-block-adslot-inline\"></span>\n<li><strong>Read the room: </strong>Context
        matters. Double texting a <a href=\"https://www.verywellmind.com/signs-of-a-tenured-friend-8646374\"
        data-component=\"link\" data-source=\"inlineLink\" data-type=\"internalLink\"
        data-ordinal=\"1\">best friend</a>? Totally normal. Double texting someone
        you just started talking to? Maybe hold off. If this person consistently takes
        a long time to reply, that\u2019s also a sign to adjust your expectations.</li>\n<li><strong>Ask
        yourself how you would feel: </strong>Before you hit send, ask yourself, if
        the roles were reversed, would this message make you feel comfortable or pressured?
        If it feels a little too intense, it\u2019s probably best to hold off.</li>\n<li><strong>Know
        when to let it go: </strong>If you\u2019ve already followed up once and still
        haven\u2019t gotten a response, it\u2019s best to leave it alone. No response
        <em>is</em> a response.</li>\n</ul>\n<div id=\"mntl-sc-block_55-0\" class=\"comp
        mntl-sc-block mntl-sc-block-adslot mntl-block\"></div>\n<p id=\"mntl-sc-block_56-0\"
        class=\"comp mntl-sc-block mntl-sc-block-html\"> Before firing off a double
        text, it\u2019s important to be mindful of the person&#39;s availability and
        use respectful language, says Cruz.\n</p>\n<div id=\"mntl-sc-block_57-0\"
        class=\"comp mntl-sc-block mntl-sc-block-adslot mntl-block\"></div>\n<span
        class=\"heading-toc\" id=\"toc-alternatives-to-double-texting\"></span><h2
        id=\"mntl-sc-block_58-0\" class=\"comp mntl-sc-block health-sc-block-heading
        mntl-sc-block-heading\"> <span class=\"mntl-sc-block-heading__text text-title-300\">
        Alternatives to Double Texting </span> </h2>\n<p id=\"mntl-sc-block_59-0\"
        class=\"comp mntl-sc-block mntl-sc-block-html\"> If you\u2019re tempted to
        send a double text but don\u2019t want to come off as pushy, there are plenty
        of other ways to handle the situation. Here are some alternatives to consider:\n</p>\n<div
        id=\"mntl-sc-block_60-0\" class=\"comp mntl-sc-block mntl-sc-block-adslot
        mntl-block\"></div>\n<ul id=\"mntl-sc-block_61-0\" class=\"comp mntl-sc-block
        mntl-sc-block-html\">\n<li><strong>Distract yourself: </strong>Sometimes,
        the best thing to do is\u2026 <em>nothing</em>. If you\u2019re feeling anxious
        about a reply, try shifting your focus elsewhere\u2014watch a show, go for
        a <a href=\"https://www.verywellmind.com/optimize-your-daily-walk-for-mental-health-benefits-8771394\"
        data-component=\"link\" data-source=\"inlineLink\" data-type=\"internalLink\"
        data-ordinal=\"1\">walk</a>, or text someone else. People get busy, and most
        of the time, they\u2019ll reply when they can.</li>\n<li><strong>Send a meme
        or an inside joke: </strong>If your first message wasn\u2019t urgent but you
        still want to nudge the conversation along, send something fun\u2014like a
        meme, GIF, or a callback to a previous joke. This keeps things light instead
        of making them feel like they owe you a reply.</li>\n<li><strong>Start a new
        conversation: </strong>If your last message didn\u2019t get a response, maybe
        it wasn\u2019t the right topic. Instead of following up on the same thing,
        bring up something fresh that might be more engaging. Try to offer something
        interesting, funny, or relevant to their interests.</li>\n<li><strong>Call
        if it\u2019s important: </strong>If it\u2019s actually urgent, a quick phone
        call can save you from the awkwardness of multiple unanswered texts. A call,
        or even a voice note, makes it clear that your message isn\u2019t just casual
        chit-chat.</li>\n</ul>\n<div id=\"mntl-sc-block_62-0\" class=\"comp mntl-sc-block
        mntl-sc-block-adslot mntl-block\"></div>\n<div id=\"health-sc-block-featuredlink--related_3-0\"
