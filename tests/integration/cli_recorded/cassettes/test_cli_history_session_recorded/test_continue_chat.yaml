        class=\\\"mw-parser-output\\\"><p>\\u00a9 2026 wikiHow, Inc. All rights reserved.
        wikiHow, Inc. is the copyright holder of this image under U.S. and international
        copyright laws. This image may not be used by other entities without the express
        written consent of wikiHow, Inc.<br>\\n<\\/p><p><br \\/>\\n<\\/p><\\/div>\",\"zoomWidth\":728,\"zoomHeight\":546,\"zoomUrl\":\"\\/images\\/thumb\\/3\\/31\\/What-Is-Double-Texting-Step-8.jpg\\/v4-728px-What-Is-Double-Texting-Step-8.jpg.webp\"}</script></div></a></div>\n<div
        class=\"step_num\" aria-hidden=\"true\">4</div><div class=\"step\">\n<b class=\"whb\"
        aria-hidden=\"true\">Read through their past messages to notice the effort
        they\u2019re putting in.</b> Even if a friend or date hasn\u2019t responded,
        that doesn\u2019t mean they\u2019re not interested in chatting. Remember that
        the quality of their messages is more important than how many they send you.
        Some signs that the person is still interested in the chatting and getting
        to know you are:<sup id=\"_ref-7\" class=\"reference\" aria-label=\"Link to
        Reference 7\"><a href=\"#_note-7\">[7]</a><span class=\"ts_popup \" hidden
        id=\"ts_popup_7\" style=\"display: none;\">\n\t<span class=\"ts_close\">X</span>\n\t\t<span
        class=\"ts_name\">Research source</span>\n\t\t<span class=\"ts_description\"></span>\n\t\t\t\t<a
        href=\"#\" class=\"ts_source\" target=\"_blank\" rel=\"noreferrer noopener\"></a>\n\n</span>\n</sup>\n<ul>\n<li>Writing
        long, thoughtful replies to your messages</li>\n<li>Asking you questions about
        how you\u2019re feeling or what you\u2019re doing</li>\n<li>Showing interest
        in spending time with you</li>\n<li>Giving you compliments</li>\n<li>Teasing
        you in a playful way</li>\n<li>Sending emojis, voice messages, and pictures</li>\n</ul>\n</div>\n<div
        class=\"clearall\"></div>\n<div class=\"scrolltomarker\" data-isstep=\"1\"
        id=\"scrollto_marker_steps_8\"></div>\n</li>\n<li id=\"step-id-28\">\n<a name=\"step_3_5\"
        class=\"stepanchor\"></a><div class=\"mwimg  largeimage  floatcenter \"><a
        href=\"#/Image:What-Is-Double-Texting-Step-9.jpg\" class=\"image\"><picture
        id=\"3925002fd55f1a8c5b8410dd133438b9\"><source type=\"image/webp\" media=\"(max-width:
