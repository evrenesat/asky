        wikiHow, Inc. is the copyright holder of this image under U.S. and international
        copyright laws. This image may not be used by other entities without the express
        written consent of wikiHow, Inc.<br>\\n<\\/p><p><br \\/>\\n<\\/p><\\/div>\",\"zoomWidth\":728,\"zoomHeight\":546,\"zoomUrl\":\"\\/images\\/thumb\\/b\\/b5\\/What-Is-Double-Texting-Step-7.jpg\\/v4-728px-What-Is-Double-Texting-Step-7.jpg.webp\"}</script></div></a></div>\n<div
        class=\"step_num\" aria-hidden=\"true\">3</div><div class=\"step\">\n<b class=\"whb\"
        aria-hidden=\"true\">Look at how often they\u2019ve messaged before to determine
        their texting style.</b> Scroll back through your messages with your crush
        to check their past response times. If they\u2019ve always taken a little
        while to respond between messages, then they just prefer to communicate less
        over text and there\u2019s nothing to worry about.<sup id=\"_ref-6\" class=\"reference\"
        aria-label=\"Link to Reference 6\"><a href=\"#_note-6\">[6]</a><span class=\"ts_popup
        \" hidden id=\"ts_popup_6\" style=\"display: none;\">\n\t<span class=\"ts_close\">X</span>\n\t\t<span
        class=\"ts_name\">Research source</span>\n\t\t<span class=\"ts_description\"></span>\n\t\t\t\t<a
        href=\"#\" class=\"ts_source\" target=\"_blank\" rel=\"noreferrer noopener\"></a>\n\n</span>\n</sup>\n<ul><li>Even
        if the person is normally quick to respond, they could be busy with something
        right now and can\u2019t get to their phone.</li></ul>\n</div>\n<div class=\"clearall\"></div>\n<div
        class=\"scrolltomarker\" data-isstep=\"1\" id=\"scrollto_marker_steps_7\"></div>\n</li>\n<li
        id=\"step-id-27\">\n<a name=\"step_3_4\" class=\"stepanchor\"></a><div class=\"mwimg
        \ largeimage  floatcenter \"><a href=\"#/Image:What-Is-Double-Texting-Step-8.jpg\"
