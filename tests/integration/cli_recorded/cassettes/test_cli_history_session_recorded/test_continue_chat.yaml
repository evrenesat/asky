        class=\"step_num\" aria-hidden=\"true\">2</div><div class=\"step\">\n<b class=\"whb\"
        aria-hidden=\"true\">Find an activity to distract yourself from texting.</b>
        Rather than sitting and thinking about why the person hasn\u2019t messaged
        back or what you could have said differently, do something you enjoy! Try
        working out, spending time with other friends, catching up on a TV show, or
        reading a book. Once you take your mind off of your phone and the conversation,
        you\u2019ll be able to come back to it with fresh eyes.<sup id=\"_ref-5\"
        class=\"reference trusted\" aria-label=\"Link to Reference 5\"><a href=\"#_note-5\">[5]</a><span
        class=\"ts_popup trustedsource\" hidden id=\"ts_popup_5\" style=\"display:
        none;\">\n\t<span class=\"ts_close\">X</span>\n\t\t<a class=\"ts_trustworthy\"
        href=\"/wikiHow:Delivering-a-Trustworthy-Experience\">Expert Source</a>\n\n\t\t<span
        class=\"ts_name\"></span>\n\t\t\t<a class=\"ts_expert_link\" href=\"/Author/Christina-Jay-NLP\"><span
        class=\"ts_expert_image\"><picture><source type=\"image/webp\" srcset=\"/images/thumb/9/9a/Christina_Jay.png/-crop-100-100-100px-Christina_Jay.png.webp\"></source><img
        src=\"/images/thumb/9/9a/Christina_Jay.png/-crop-100-100-100px-Christina_Jay.png\"
