        class=\"step_num\" aria-hidden=\"true\">6</div><div class=\"step\">\n<b class=\"whb\"
        aria-hidden=\"true\">Maintain a positive attitude.</b> It might make you feel
        nervous when the person isn\u2019t responding, but it doesn\u2019t mean they\u2019re
        not interested. They might think that the message didn\u2019t need a response
        or they may not communicate their feelings very well over text. Pump yourself
        up with some positive affirmations that you\u2019re worth talking to and that
        the person wants to keep the convo going.<sup id=\"_ref-9\" class=\"reference\"
        aria-label=\"Link to Reference 9\"><a href=\"#_note-9\">[9]</a><span class=\"ts_popup
        \" hidden id=\"ts_popup_9\" style=\"display: none;\">\n\t<span class=\"ts_close\">X</span>\n\t\t<span
