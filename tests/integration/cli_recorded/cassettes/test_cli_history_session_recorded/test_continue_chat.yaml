        class=\"steps_list_2\"><li id=\"step-id-310\">\n<a name=\"step_4_1\" class=\"stepanchor\"></a><div
        class=\"mwimg  largeimage  floatcenter \"><a href=\"#/Image:What-Is-Double-Texting-Step-11.jpg\"
        class=\"image\"><picture id=\"84eb4f53a9a087e4305314b4f9d1720a\"><source type=\"image/webp\"
        media=\"(max-width: 728px)\" width=\"460\" height=\"546\" srcset=\"https://www.wikihow.com/images/thumb/4/44/What-Is-Double-Texting-Step-11.jpg/v4-460px-What-Is-Double-Texting-Step-11.jpg.webp
        460w\"></source><source type=\"image/jpeg\" media=\"(max-width: 728px)\" width=\"460\"
