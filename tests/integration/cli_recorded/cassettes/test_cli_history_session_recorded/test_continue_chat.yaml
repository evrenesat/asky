        wikiHow, Inc. is the copyright holder of this image under U.S. and international
        copyright laws. This image may not be used by other entities without the express
        written consent of wikiHow, Inc.<br>\\n<\\/p><p><br \\/>\\n<\\/p><\\/div>\",\"zoomWidth\":728,\"zoomHeight\":546,\"zoomUrl\":\"\\/images\\/thumb\\/d\\/d6\\/What-Is-Double-Texting-Step-9.jpg\\/v4-728px-What-Is-Double-Texting-Step-9.jpg.webp\"}</script></div></a></div>\n<div
        class=\"step_num\" aria-hidden=\"true\">5</div><div class=\"step\">\n<b class=\"whb\"
        aria-hidden=\"true\">Assume the person has good intentions.</b> It can be
        easy to think that an S.O. or crush is upset or ignoring you, but it\u2019s
        hard to tell how they\u2019re really feeling over text. They could truly be
        busy and not able to get to their phone, so don\u2019t jump to any conclusions
        about why they haven\u2019t messaged you back yet.<sup id=\"_ref-8\" class=\"reference
        trusted\" aria-label=\"Link to Reference 8\"><a href=\"#_note-8\">[8]</a><span
        class=\"ts_popup trustedsource\" hidden id=\"ts_popup_8\" style=\"display:
