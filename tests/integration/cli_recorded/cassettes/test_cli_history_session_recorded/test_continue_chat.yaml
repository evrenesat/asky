        .postTitle { text-decoration: underline!important; } </style><div style=\"padding-left:1em;
        padding-right:1em;\"><span class=\"ctaText\">See also</span>&nbsp; <span class=\"postTitle\">5
        Things You Can Do If Your Friends Don\u2019t Like You</span></div></a></div><p>When
        some news drops that excites you or shocks you, it\u2019s generally well-received
        when you send a second message related to that. There\u2019s a point to double
        texting and you aren\u2019t just being desperate or needy for attention.</p>\n\n\n\n<h2
        class=\"wp-block-heading\"><strong>How To Double Text Without Turning Off
        The Other Person</strong></h2>\n\n\n\n<h3 class=\"wp-block-heading\"><strong>1.
        Be Patient</strong></h3>\n\n\n\n<p>Before you even hit send on your second
        text, be sure that you have given the other person enough time to respond.</p>\n\n\n\n<p>Patience
        always pays in all types of relationships.</p>\n\n\n\n<p>If it hasn\u2019t
        been more than an hour since your initial text and there\u2019s no imminent
        reason to send a double text, just wait for a few more hours.</p>\n\n\n\n<p>Also,
        when you do double text later on, it won\u2019t appear as if you\u2019re super
        needy or clingy because you waited for a good amount of time.</p>\n\n\n\n<h3
        class=\"wp-block-heading\"><strong>2. Keep It Light</strong></h3>\n\n\n\n<p>Another
        tip for double texting pertains to tone. The last thing you want to do is
        send a message that easily reads as desperate, needy, clingy, or agitated.</p>\n\n\n\n<p>That\u2019s
        going to turn off the other person.</p>\n\n\n\n<p>Passive aggressive behavior
        never translates well in relationships. Let your double text be casual, relaxed,
        and simple.</p>\n\n\n\n<p>Don\u2019t partake in any games or manipulation
        either.</p>\n\n\n\n<h3 class=\"wp-block-heading\"><strong>3. Reference The
        Previous Message</strong></h3>\n\n\n\n<p>If the context permits, try using
        the initial message as a springboard to send your double text. Even if your
        objective is to gain their attention, subtlety in your approach is still advisable.</p>\n\n\n\n<p>For
        example, you can say, \u201C<em>Hey, I saw this hilarious meme that reminded
        me of what we were talking about\u2026\u201D</em></p>\n\n\n\n<h3 class=\"wp-block-heading\"><strong>4.
        Provide Value</strong></h3>\n\n\n\n<p>In the event that the conversation pertains
        to business, I would actually advise you to provide value as a follow-up text.</p>\n\n\n\n<p>Again,
        even if the recipient can observe your intention to gain their attention,
        they\u2019ll appreciate the fact that you aren\u2019t wasting their time by
        providing more substance and value in your double text.</p>\n\n\n\n<h3 class=\"wp-block-heading\"><strong>5.
        Choose An Appropriate Time</strong></h3>\n\n\n\n<p>Does it make sense to send
        a double text when the other person is unavailable, in a meeting, on a trip,
        or asleep?</p>\n\n\n\n<p>It doesn\u2019t. If you\u2019re going to send a follow-up
        message, choose a time when you suspect that they will be available to see
        your message and reply without you coming across as intrusive or inconsiderate.</p>\n\n\n\n<div
        style=\"clear:both; margin-top:1em; margin-bottom:1em;\"><a href=\"https://mywisefriend.com/is-it-rude-not-to-reply-to-a-text-message/\"
        target=\"_self\" rel=\"dofollow\" class=\"u0c693831e1de0e80678c3010902b382e\"><!--
