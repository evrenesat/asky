        here to get them.</a>\n      </p>\n<a name=\"What-is-double-texting?\"></a><h2>What
        is double texting?</h2>\n<p>What counts as a double text is when someone sends
        you a message and waits a while before sending you another text. If someone
        texts you more than one message in a row without waiting, it&#8217;s not a
        double text. The time between texts is too brief. So how much time has to
        pass between messages before we can speak of double texting? Depends on who
        you\u2019re talking with. But waiting over half an hour between texts is a
        pretty good rule of thumb.</p>\n<a name=\"What-to-do-if-she-doesn&-8217-t-text-back?\"></a><h2>What
        to do if she doesn&#8217;t text back?</h2>\n<p>If she&#8217;s not responding
        to you, you&#8217;re in the danger zone.</p>\n<p>The right text can grab her
