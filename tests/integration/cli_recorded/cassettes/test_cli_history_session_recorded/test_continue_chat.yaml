        \ class=\"site grid-container container hfeed grid-parent\" id=\"page\">\n\t\t\t\t<div
        \ class=\"site-content\" id=\"content\">\n\t\t\t\n\t<div  class=\"content-area
        grid-parent mobile-grid-100 grid-100 tablet-grid-100\" id=\"primary\">\n\t\t<main
        class=\"site-main\" id=\"main\">\n\t\t\t\n<article id=\"post-10373\" class=\"post-10373
        post type-post status-publish format-standard has-post-thumbnail hentry category-dating\"
        itemtype=\"https://schema.org/CreativeWork\" itemscope>\n\t<div class=\"inside-article\">\n\t\t\t\t\t<header
        class=\"entry-header\">\n\t\t\t\t<h1 class=\"entry-title\" itemprop=\"headline\">No
        response&#8230;Should you send a second message? | Online Dating</h1><div
        class=\"gb-container gb-container-8a25fc79 inline-post-meta-area\"><div class=\"gb-inside-container\">\n<div
        class=\"gb-headline gb-headline-df13bb6b gb-headline-text\">Written By: <a
        href=\"https://healthyframework.com/author/matthf/\">Matt Seymour, MSF</a></div>\n</div></div>\t\t\t</header>\n\t\t\t\n\t\t<div
        class=\"entry-content\" itemprop=\"text\">\n\t\t\t\n<p class=\"gb-headline
        gb-headline-d53b0f45 gb-headline-text\">Fact Checked by: <a href=\"https://healthyframework.com/detective-nic-nalder/\">Det.
        Nicholas Nalder</a></p>\n\n\n\n<ol class=\"breadcrumb\" itemscope itemtype=\"https://schema.org/BreadcrumbList\">\n
        \ <li itemprop=\"itemListElement\" itemscope\n      itemtype=\"https://schema.org/ListItem\">\n
        \   <a itemprop=\"item\" href=\"https://healthyframework.com/\">\n    <span
        itemprop=\"name\">Home</span></a>\n    <meta itemprop=\"position\" content=\"1\"
        />\n  </li>\n  <li itemprop=\"itemListElement\" itemscope\n      itemtype=\"https://schema.org/ListItem\">\n
        \   <a itemprop=\"item\" href=\"https://healthyframework.com/articles/\">\n
        \   <span itemprop=\"name\">Articles</span></a>\n    <meta itemprop=\"position\"
        content=\"2\" />\n  </li>\n  <li itemprop=\"itemListElement\" itemscope\n
        \     itemtype=\"https://schema.org/ListItem\">\n    <span itemprop=\"name\"
        aria-current=\"location\">Should you send a second message?</span></a>\n    <meta
        itemprop=\"position\" content=\"3\" />\n  </li>\n</ol>\n\n\n\n<p>This is really
        one of the worst feelings in all of online dating. You\u2019ve found that
        amazing person and you spent all afternoon crafting the perfect message to
        send to them. You click send, and then you wait\u2026and you wait\u2026until
        you start to realize that they might not be writing you back. </p>\n\n\n\n<p>And
        then the question hits you\u2014should you send a second message? Well, this
        is the million dollar question that we\u2019re going to cover today.</p>\n\n\n<div
        class=\"wp-block-image custom\">\n<figure class=\"aligncenter size-large\"><img
        fetchpriority=\"high\" decoding=\"async\" width=\"1024\" height=\"683\" src=\"https://healthyframework.com/wp-content/uploads/2024/02/ManSendingMessage-1024x683.jpg\"
        alt=\"Young Black Man Looking At His Phone And Thinking About Sending A Second
        Message\" class=\"wp-image-46437\" srcset=\"https://healthyframework.com/wp-content/uploads/2024/02/ManSendingMessage-1024x683.jpg
        1024w, https://healthyframework.com/wp-content/uploads/2024/02/ManSendingMessage-300x200.jpg
        300w, https://healthyframework.com/wp-content/uploads/2024/02/ManSendingMessage-768x512.jpg
        768w, https://healthyframework.com/wp-content/uploads/2024/02/ManSendingMessage-1536x1024.jpg
        1536w, https://healthyframework.com/wp-content/uploads/2024/02/ManSendingMessage-2048x1365.jpg
        2048w\" sizes=\"(max-width: 1024px) 100vw, 1024px\" /></figure>\n</div>\n\n\n<h2
        class=\"wp-block-heading has-base-3-color has-global-color-12-background-color
        has-text-color has-background\" id=\"h-the-answer\">The Answer</h2>\n\n\n\n<p>Yes.
        You didn&#8217;t expect it to be that easy, did you? Well it is\u2014but it
        also isn&#8217;t. If you\u2019ve read any of our blogs or advice columns before,
        you know that most of our answers come with conditions, but this one is pretty
        clear-cut. </p>\n\n\n\n<blockquote class=\"wp-block-quote is-layout-flow wp-block-quote-is-layout-flow\">\n<p><strong>You
        can and should send a second message if you want to (with conditions).</strong>
        </p>\n</blockquote>\n\n\n\n<p>A lot of times messages will get buried in online
        dating especially if you\u2019re messaging a female (females typically get
        way more messages than men). Sometimes, people will just go through and clean
        everything out or will do a quick scan through deleting things and might accidentally
        delete your message.</p>\n\n\n\n<p><strong>But, how can you know if this is
        the case or if they\u2019re just not interested?</strong> The answer is that
        you can\u2019t. If they don&#8217;t respond, you\u2019ll have no way of knowing
        if they are just not interested, forgot to reply, or accidentally deleted
        your message.</p>\n\n\n\n<p>That being said, why not err on the side of caution
        and send a second message? What\u2019s the worst that can happen? The worst
        that can happen is they just delete it again or send you a message telling
        you they aren\u2019t interested. </p>\n\n\n\n<p>Is that really that bad? We
        don\u2019t think so and you shouldn\u2019t either. </p>\n\n\n\n<p>If you\u2019re
        too sensitive to take an <em>I\u2019m not interested</em> letter from someone,
        then you need to take a break from dating for a while. But, most people are
        just going to delete your message again if they deleted the first one and
        move on so you really don\u2019t need to worry about that.</p>\n\n\n\n<p>The
        best that can happen is they see your message and are interested! That\u2019s
        an opportunity you\u2019d never have gotten if you didn\u2019t send that second
        message. </p>\n\n\n\n<blockquote class=\"wp-block-quote is-layout-flow wp-block-quote-is-layout-flow\">\n<p><strong>The
        only way you\u2019re going to put your mind to rest on whether you should
        send that second message or not is to send that second message.</strong></p>\n</blockquote>\n\n\n\n<h2
        class=\"wp-block-heading has-base-3-color has-global-color-12-background-color
        has-text-color has-background\" id=\"h-the-catch\">The Catch</h2>\n\n\n\n<p>We
        know we said this was pretty clear cut and there really was no catch, but
        there is a little one. <strong>You need to make sure that you aren\u2019t
        sending the second message too soon.</strong> If it\u2019s been three hours
        and you haven\u2019t heard from them, don\u2019t send a second message. </p>\n\n\n\n<p>Seriously\u2026give
        them some time to get online and read through their messages and get back
        to you. Ideally, we recommend waiting at least 8 days before sending your
        second message. Some people only check their accounts one day a week, and
        this will ensure that they have a chance to read your message and respond
        if they want to.</p>\n\n\n\n<p>Secondly, make sure that your second message
        is not rude or calling them out for not responding. You can say something
        to the effect of \u201CHey! Just wanted to see if you were around to chat.
        Sorry for the second message, but you seem really cool, and I\u2019d kick
        myself if I didn\u2019t try to reach out again.&#8221;</p>\n\n\n\n<p>Anything
        to that effect would be perfect. Please don\u2019t send \u201CHey, why are
        you ignoring me?\u201D or ANYTHING like that, please. Imagine how well that
        would go over if they just hadn\u2019t gotten a chance to read your first
        message. You\u2019d now shot yourself in the foot.</p>\n\n\n\n<h3 class=\"wp-block-heading
        has-global-color-8-background-color has-background\">The Quality of Your First
        Message</h3>\n\n\n\n<p>One other small catch or caveat we want to mention
        is that a lot of this is dependent on the quality of your first message. If
        you sent a terrible first message, there&#8217;s probably no reason to send
        a second message and just add insult to injury. </p>\n\n\n\n<p>Make sure you&#8217;re
        focusing on <a href=\"https://healthyframework.com/sending-the-perfect-first-message/\">how
        to send a great first message</a> or the second message is pointless. The
        article we&#8217;ve linked is a must-read if you&#8217;re looking to increase
        your online dating responses and success. </p>\n\n\n\n<h2 class=\"wp-block-heading
        has-base-3-color has-global-color-12-background-color has-text-color has-background\"
        id=\"h-another-option-sending-another-first-message-instead\">Another Option
        &#8211; Sending Another First Message Instead</h2>\n\n\n\n<p>It&#8217;s easy
        to get fixated on one person when you&#8217;re dating online. You&#8217;ll
        tell yourself they&#8217;re the greatest thing since sliced bread, even if
        you&#8217;ve never talked to them. While they might be, another great strategy
        for those curious about sending a second message is to not put all your eggs
        in one basket. Instead of sending them a second message, send out a few more
        first messages! Give a few more quality men or women the chance to respond.</p>\n\n\n\n<h2
        class=\"wp-block-heading has-base-3-color has-global-color-12-background-color
        has-text-color has-background\" id=\"h-read-receipts\">Read Receipts</h2>\n\n\n\n<p>The
        one exception to all of this is when you use an online dating site with read
        receipts. This is a function that tells you when and if someone read your
        message. On a lot of sites, it will also tell you if they just deleted your
        message. </p>\n\n\n\n<p>This is a feature that we highly recommend getting
        if it\u2019s available. It can help to put a lot of your concerns to rest
        and prevent you from sending a second message if they haven\u2019t read your
        first one yet. </p>\n\n\n\n<p><em>Read: <a href=\"https://healthyframework.com/read-receipts/\">Understanding
        How Read Receipts Work</a></em></p>\n\t\t</div>\n\n\t\t\t</div>\n</article>\n\t\t</main>\n\t</div>\n\n\t\n\t</div>\n</div>\n\n\n<div
