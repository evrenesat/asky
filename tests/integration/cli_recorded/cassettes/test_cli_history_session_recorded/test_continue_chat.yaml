        may feel the urge to double text to see if they read your message.\n<ul><li>Sending
        a short burst of texts in a row isn\u2019t considered double texting. If you\u2019re
        telling a long story, sending it in small chunks makes it easier to read than
        a long paragraph.</li></ul>\n<script>WH.performance.mark('step1_rendered');</script>\n</div>\n<div
