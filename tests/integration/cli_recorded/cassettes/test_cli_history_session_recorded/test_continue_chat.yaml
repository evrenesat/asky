        justify;\"><span class=\"jgG6ef C9DxTc \" style=\"color: #ffffff; font-family:
        Arial; font-weight: 400; vertical-align: baseline;\">The </span><span class=\"jgG6ef
        C9DxTc \" style=\"color: #ffffff; font-family: Arial; font-weight: 700; vertical-align:
        baseline;\">Seventh-day Adventist Laymen Church</span><span class=\"jgG6ef
        C9DxTc \" style=\"color: #ffffff; font-family: Arial; font-weight: 400; vertical-align:
        baseline;\"> is a self-supporting, independent church organization established
        in Papua New Guinea by conservative Seventh-day Adventists. Our decision to
        stand independent from the directives of the General Conference was prompted
        by the prevailing apostasies that destroy the purity of the truth\u2014the
        truth that makes us, as Seventh-day Adventists, God\u2019s distinct people,
        a church on earth second to none.</span></p><p  dir=\"ltr\" class=\"zfr3Q
