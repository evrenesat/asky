        class=\"image_details\"><script type=\"application/json\">{\"smallUrl\":\"https:\\/\\/www.wikihow.com\\/images\\/thumb\\/d\\/d6\\/What-Is-Double-Texting-Step-9.jpg\\/v4-460px-What-Is-Double-Texting-Step-9.jpg\",\"bigUrl\":\"\\/images\\/thumb\\/d\\/d6\\/What-Is-Double-Texting-Step-9.jpg\\/v4-728px-What-Is-Double-Texting-Step-9.jpg\",\"smallWidth\":460,\"smallHeight\":345,\"bigWidth\":728,\"bigHeight\":546,\"licensing\":\"<div
