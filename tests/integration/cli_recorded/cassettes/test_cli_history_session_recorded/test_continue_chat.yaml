        \           \"https:\\/\\/www.facebook.com\\/joshuapompey\"\n        ]\n    },\n
        \   \"datePublished\": \"2022-05-06\",\n    \"dateModified\": \"2025-12-05\",\n
        \   \"publisher\": {\n        \"@context\": \"http:\\/\\/schema.org\",\n        \"@type\":
        \"Organization\",\n        \"name\": \"wikiHow\",\n        \"url\": \"https:\\/\\/www.wikihow.com\",\n
        \       \"logo\": {\n            \"@type\": \"ImageObject\",\n            \"url\":
        \"https:\\/\\/www.wikihow.com\\/skins\\/owl\\/images\\/wikihow_logo_nobg_60.png\",\n
        \           \"width\": 326,\n            \"height\": 60\n        },\n        \"sameAs\":
        [\n            \"https:\\/\\/www.facebook.com\\/wikiHow\\/\",\n            \"https:\\/\\/twitter.com\\/wikiHow\",\n
        \           \"https:\\/\\/www.instagram.com\\/wikihow\\/\",\n            \"https:\\/\\/www.linkedin.com\\/company\\/wikihow\\/\",\n
        \           \"https:\\/\\/www.youtube.com\\/user\\/WikiHow\"\n        ]\n
        \   },\n    \"step\": [\n        {\n            \"@type\": \"HowToSection\",\n
        \           \"name\": \"What is double texting?\",\n            \"itemListElement\":
        [\n                {\n                    \"@type\": \"HowToStep\",\n                    \"text\":
        \"Double texting is sending a second text before getting a reply to the first.
        If you\\u2019re waiting for a date, FWB, or even a friend to respond and your
        nerves kick in, you may feel the urge to double text to see if they read your
        message.\\nSending a short burst of texts in a row isn\\u2019t considered
        double texting. If you\\u2019re telling a long story, sending it in small
        chunks makes it easier to read than a long paragraph.\",\n                    \"image\":
        \"https:\\/\\/www.wikihow.com\\/images\\/thumb\\/3\\/3e\\/What-Is-Double-Texting-Step-1.jpg\\/v4-460px-What-Is-Double-Texting-Step-1.jpg\",\n
        \                   \"url\": \"https:\\/\\/www.wikihow.com\\/What-Is-Double-Texting#step-id-00\"\n
        \               }\n            ]\n        },\n        {\n            \"@type\":
        \"HowToSection\",\n            \"name\": \"Is it OK to double text?\",\n            \"itemListElement\":
        [\n                {\n                    \"@type\": \"HowToStep\",\n                    \"text\":
        \"Double texting usually isn\\u2019t the best way to continue your convo.
        It\\u2019s a bummer when you don\\u2019t get a text back, but a double text
        could sound pushy and be a turn-off. Even if you don\\u2019t intend to, sending
        multiple messages without hearing back from a person might come across as
        clingy or desperate.\",\n                    \"image\": \"https:\\/\\/www.wikihow.com\\/images\\/thumb\\/d\\/da\\/What-Is-Double-Texting-Step-2.jpg\\/v4-460px-What-Is-Double-Texting-Step-2.jpg\",\n
        \                   \"url\": \"https:\\/\\/www.wikihow.com\\/What-Is-Double-Texting#step-id-11\"\n
        \               },\n                {\n                    \"@type\": \"HowToStep\",\n
        \                   \"text\": \"Double texting is okay if you need an urgent
        answer. If you need to confirm information or let your friend or date know
        about a change of plans, you can definitely double text to keep them updated.
        Maybe the restaurant you told them to meet you at is closed and you need to
        go somewhere else. Or maybe you asked for an address for their party and they
        haven\\u2019t responded when you\\u2019re about to leave. Either way, shoot
        them a message to check in.\\n\\n\\nFirst text: \\u201cSO excited to see you
        tonight. Where are we going?\\u201d Second text: \\u201cI\\u2019m just about
        to leave \\ud83d\\ude0a What\\u2019s the address again?\\u201d\\n\\nFirst
        text: \\u201cOMG do you want to go to the Harry Styles concert with me?\\u201d
        Second text: \\u201cTickets are going pretty fast! Let me know if I should
        snag some for us!\\u201d\",\n                    \"image\": \"https:\\/\\/www.wikihow.com\\/images\\/thumb\\/3\\/30\\/What-Is-Double-Texting-Step-3.jpg\\/v4-460px-What-Is-Double-Texting-Step-3.jpg\",\n
        \                   \"url\": \"https:\\/\\/www.wikihow.com\\/What-Is-Double-Texting#step-id-12\"\n
        \               },\n                {\n                    \"@type\": \"HowToStep\",\n
        \                   \"text\": \"If you\\u2019re talking about something serious,
        call instead of double texting. It\\u2019s better to stick to casual conversations
        when you\\u2019re chatting over text so you don\\u2019t miscommunicate or
        get confused. If you want to have a serious talk about how you\\u2019re feeling
        or about a pressing issue, pick up the phone and call them instead.\",\n                    \"image\":
        \"https:\\/\\/www.wikihow.com\\/images\\/thumb\\/a\\/a8\\/What-Is-Double-Texting-Step-4.jpg\\/v4-460px-What-Is-Double-Texting-Step-4.jpg\",\n
        \                   \"url\": \"https:\\/\\/www.wikihow.com\\/What-Is-Double-Texting#step-id-13\"\n
        \               }\n            ]\n        },\n        {\n            \"@type\":
        \"HowToSection\",\n            \"name\": \"How to Avoid Double Texting\",\n
        \           \"itemListElement\": [\n                {\n                    \"@type\":
        \"HowToStep\",\n                    \"text\": \"Put your phone away. Checking
        your phone every few minutes will only make you feel antsier as you wait,
        so try to take a breath and relax. Put your phone on silent and set it in
        a drawer or under a pillow to take it off of your mind. Do an activity in
        a different room for a little while before coming back and checking on your
        messages.\",\n                    \"image\": \"https:\\/\\/www.wikihow.com\\/images\\/thumb\\/b\\/b2\\/What-Is-Double-Texting-Step-5.jpg\\/v4-460px-What-Is-Double-Texting-Step-5.jpg\",\n
        \                   \"url\": \"https:\\/\\/www.wikihow.com\\/What-Is-Double-Texting#step-id-24\"\n
        \               },\n                {\n                    \"@type\": \"HowToStep\",\n
        \                   \"text\": \"Find an activity to distract yourself from
        texting. Rather than sitting and thinking about why the person hasn\\u2019t
        messaged back or what you could have said differently, do something you enjoy!
        Try working out, spending time with other friends, catching up on a TV show,
        or reading a book. Once you take your mind off of your phone and the conversation,
        you\\u2019ll be able to come back to it with fresh eyes.\\nOther things you
        could try include cooking a meal, taking a walk, or cleaning up around your
        home.\",\n                    \"image\": \"https:\\/\\/www.wikihow.com\\/images\\/thumb\\/4\\/46\\/What-Is-Double-Texting-Step-6.jpg\\/v4-460px-What-Is-Double-Texting-Step-6.jpg\",\n
        \                   \"url\": \"https:\\/\\/www.wikihow.com\\/What-Is-Double-Texting#step-id-25\"\n
        \               },\n                {\n                    \"@type\": \"HowToStep\",\n
        \                   \"text\": \"Look at how often they\\u2019ve messaged before
        to determine their texting style. Scroll back through your messages with your
        crush to check their past response times. If they\\u2019ve always taken a
        little while to respond between messages, then they just prefer to communicate
        less over text and there\\u2019s nothing to worry about.\\nEven if the person
        is normally quick to respond, they could be busy with something right now
        and can\\u2019t get to their phone.\",\n                    \"image\": \"https:\\/\\/www.wikihow.com\\/images\\/thumb\\/b\\/b5\\/What-Is-Double-Texting-Step-7.jpg\\/v4-460px-What-Is-Double-Texting-Step-7.jpg\",\n
        \                   \"url\": \"https:\\/\\/www.wikihow.com\\/What-Is-Double-Texting#step-id-26\"\n
        \               },\n                {\n                    \"@type\": \"HowToStep\",\n
        \                   \"text\": \"Read through their past messages to notice
        the effort they\\u2019re putting in. Even if a friend or date hasn\\u2019t
        responded, that doesn\\u2019t mean they\\u2019re not interested in chatting.
        Remember that the quality of their messages is more important than how many
        they send you. Some signs that the person is still interested in the chatting
        and getting to know you are:\\n\\nWriting long, thoughtful replies to your
        messages\\nAsking you questions about how you\\u2019re feeling or what you\\u2019re
        doing\\nShowing interest in spending time with you\\nGiving you compliments\\nTeasing
        you in a playful way\\nSending emojis, voice messages, and pictures\",\n                    \"image\":
        \"https:\\/\\/www.wikihow.com\\/images\\/thumb\\/3\\/31\\/What-Is-Double-Texting-Step-8.jpg\\/v4-460px-What-Is-Double-Texting-Step-8.jpg\",\n
        \                   \"url\": \"https:\\/\\/www.wikihow.com\\/What-Is-Double-Texting#step-id-27\"\n
        \               },\n                {\n                    \"@type\": \"HowToStep\",\n
        \                   \"text\": \"Assume the person has good intentions. It
        can be easy to think that an S.O. or crush is upset or ignoring you, but it\\u2019s
        hard to tell how they\\u2019re really feeling over text. They could truly
        be busy and not able to get to their phone, so don\\u2019t jump to any conclusions
        about why they haven\\u2019t messaged you back yet.\",\n                    \"image\":
        \"https:\\/\\/www.wikihow.com\\/images\\/thumb\\/d\\/d6\\/What-Is-Double-Texting-Step-9.jpg\\/v4-460px-What-Is-Double-Texting-Step-9.jpg\",\n
        \                   \"url\": \"https:\\/\\/www.wikihow.com\\/What-Is-Double-Texting#step-id-28\"\n
        \               },\n                {\n                    \"@type\": \"HowToStep\",\n
        \                   \"text\": \"Maintain a positive attitude. It might make
        you feel nervous when the person isn\\u2019t responding, but it doesn\\u2019t
        mean they\\u2019re not interested. They might think that the message didn\\u2019t
        need a response or they may not communicate their feelings very well over
        text. Pump yourself up with some positive affirmations that you\\u2019re worth
        talking to and that the person wants to keep the convo going.\",\n                    \"image\":
        \"https:\\/\\/www.wikihow.com\\/images\\/thumb\\/8\\/83\\/What-Is-Double-Texting-Step-10.jpg\\/v4-460px-What-Is-Double-Texting-Step-10.jpg\",\n
        \                   \"url\": \"https:\\/\\/www.wikihow.com\\/What-Is-Double-Texting#step-id-29\"\n
        \               }\n            ]\n        },\n        {\n            \"@type\":
        \"HowToSection\",\n            \"name\": \"When to Send a Double Text\",\n
        \           \"itemListElement\": [\n                {\n                    \"@type\":
        \"HowToStep\",\n                    \"text\": \"Wait 1\\u20132 days to send
        another text. Even if you\\u2019re really tempted to reach out again, give
        them some time to respond. It\\u2019s normal to have a few days in between
        texts with your crush or at the start of a relationship, so try not to worry.
        They could actually be busy or be away from their phone and they\\u2019ll
        respond when they get the chance.\\n\\nGiving the person more time also gives
        them a chance to miss you. Once they realize they haven\\u2019t heard from
        you, they\\u2019ll check up and see the text they missed.\\n\\nReader Poll:
        We asked 562 wikiHow readers how many times they think it\\u2019s okay to
        text someone in a row without a response and 56% of them said twice. [Take
        Poll]\",\n                    \"image\": \"https:\\/\\/www.wikihow.com\\/images\\/thumb\\/4\\/44\\/What-Is-Double-Texting-Step-11.jpg\\/v4-460px-What-Is-Double-Texting-Step-11.jpg\",\n
        \                   \"url\": \"https:\\/\\/www.wikihow.com\\/What-Is-Double-Texting#step-id-310\"\n
        \               }\n            ]\n        },\n        {\n            \"@type\":
        \"HowToSection\",\n            \"name\": \"What to Say in a Double Text\",\n
        \           \"itemListElement\": [\n                {\n                    \"@type\":
        \"HowToStep\",\n                    \"text\": \"Move on to a new topic when
        you text them again. One reason the person didn\\u2019t respond might be that
        they didn\\u2019t feel like there was much to add to the conversation. Rather
        than chatting about the same subject or just letting the convo die out, talk
        about something new and exciting to keep the person engaged.\\nReplying with
        a sarcastic response about why they didn\\u2019t reply could sound a little
        mean since your tone can be hard to read.\",\n                    \"image\":
        \"https:\\/\\/www.wikihow.com\\/images\\/thumb\\/d\\/df\\/What-Is-Double-Texting-Step-12.jpg\\/v4-460px-What-Is-Double-Texting-Step-12.jpg\",\n
        \                   \"url\": \"https:\\/\\/www.wikihow.com\\/What-Is-Double-Texting#step-id-411\"\n
        \               },\n                {\n                    \"@type\": \"HowToStep\",\n
        \                   \"text\": \"Try restarting the conversation with a fun
        question. Posing a question encourages your crush or date to answer with more
        than a short sentence.  If you\\u2019re still getting to know the person,
        try a classic \\u201cwould you rather\\u201d icebreaker or a question about
        their interests. If you want to get to know your friend or S.O. on a deeper
        level, ask about the highlight of their day so you learn what excites them.\\n\\n\\u201cHey
        quick question! Would you rather vacation for a week at the beach or in a
        quiet cabin on a lake?\\u201d\\n\\u201cHi hi \\ud83d\\ude04 How was that concert
        last night? I remember you were so excited to go\\u201d\\n\\u201cHey you!
        Did you have anything exciting happen at work today?\\u201d\",\n                    \"image\":
        \"https:\\/\\/www.wikihow.com\\/images\\/thumb\\/e\\/e3\\/What-Is-Double-Texting-Step-13.jpg\\/v4-460px-What-Is-Double-Texting-Step-13.jpg\",\n
        \                   \"url\": \"https:\\/\\/www.wikihow.com\\/What-Is-Double-Texting#step-id-412\"\n
        \               },\n                {\n                    \"@type\": \"HowToStep\",\n
        \                   \"text\": \"Mention something exciting about your day.
        If you want to celebrate with your crush or a friend, tell them about what\\u2019s
        put you in such a good mood. If the person you\\u2019re chatting with sees
        that you\\u2019re really happy about something, they might message you back
        to share your excitement. Keep a few of the details to yourself to sound a
        little mysterious and encourage the person to ask you about it more.\\n\\n\\u201cOMG
        I just had the most amazing work day \\ud83d\\ude0a You won\\u2019t believe
        who I ran into!\\u201d\\n\\u201cOur study sessions really paid off because
        I ACED that test! Thank you SO much for your help \\ud83e\\udd70\\u201d\\n\\u201cHi!!
        I got some amazing news! Let me know when you see this so I can tell you all
        about it!\\u201d\",\n                    \"image\": \"https:\\/\\/www.wikihow.com\\/images\\/thumb\\/8\\/8d\\/What-Is-Double-Texting-Step-14.jpg\\/v4-460px-What-Is-Double-Texting-Step-14.jpg\",\n
        \                   \"url\": \"https:\\/\\/www.wikihow.com\\/What-Is-Double-Texting#step-id-413\"\n
        \               },\n                {\n                    \"@type\": \"HowToStep\",\n
        \                   \"text\": \"Let the person know you\\u2019re thinking
        about them. Even just quickly mentioning that they were on your mind is a
        good way to re-spark their interest. If the person genuinely missed your message,
        telling them how you\\u2019re feeling lets them know you\\u2019re still into
        them.\\n\\n\\u201cHey you \\ud83d\\ude0a hope you\\u2019ve been doing well!
        Wanna catch up this weekend?\\u201d\\n\\u201cHi \\ud83d\\ude04 you\\u2019ve
        been on my mind today. How have you been?\\u201d\\n\\u201cHey! I\\u2019m at
        the cafe where we met up last week and it reminded me of you. What\\u2019s
        up?\\u201d\",\n                    \"image\": \"https:\\/\\/www.wikihow.com\\/images\\/thumb\\/f\\/fe\\/What-Is-Double-Texting-Step-15.jpg\\/v4-460px-What-Is-Double-Texting-Step-15.jpg\",\n
        \                   \"url\": \"https:\\/\\/www.wikihow.com\\/What-Is-Double-Texting#step-id-414\"\n
        \               }\n            ]\n        }\n    ],\n    \"description\":
        \"You've probably heard of \\\"double texting\\\" when you're chatting with
        a crush or S.O., but how do you know if you're doing it in your messages?
        Should you send a double text or try to avoid it? If you're wondering what
        double texting is and...\"\n}</script><script type=\"application/ld+json\">{\n
