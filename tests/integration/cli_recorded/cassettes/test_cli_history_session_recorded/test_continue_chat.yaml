        class=\"step_num\" aria-hidden=\"true\">4</div><div class=\"step\">\n<b class=\"whb\"
        aria-hidden=\"true\">Let the person know you\u2019re thinking about them.</b>
        Even just quickly mentioning that they were on your mind is a good way to
        re-spark their interest. If the person genuinely missed your message, telling
        them how you\u2019re feeling lets them know you\u2019re still into them.\n<ul>\n<li>\u201CHey
        you \U0001F60A hope you\u2019ve been doing well! Wanna catch up this weekend?\u201D</li>\n<li>\u201CHi
        \U0001F604 you\u2019ve been on my mind today. How have you been?\u201D</li>\n<li>\u201CHey!
        I\u2019m at the cafe where we met up last week and it reminded me of you.
        What\u2019s up?\u201D</li>\n</ul>\n</div>\n<div class=\"clearall\"></div>\n<div
