        \ largeimage  floatcenter \"><a href=\"#/Image:What-Is-Double-Texting-Step-4.jpg\"
        class=\"image\"><picture id=\"faff5afe2fe03229063d40b1f4007491\"><source type=\"image/webp\"
        media=\"(max-width: 728px)\" width=\"460\" height=\"546\" srcset=\"https://www.wikihow.com/images/thumb/a/a8/What-Is-Double-Texting-Step-4.jpg/v4-460px-What-Is-Double-Texting-Step-4.jpg.webp
        460w\"></source><source type=\"image/jpeg\" media=\"(max-width: 728px)\" width=\"460\"
