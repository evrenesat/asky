        class=\"step_num\" aria-hidden=\"true\">2</div><div class=\"step\">\n<b class=\"whb\"
        aria-hidden=\"true\">Double texting is okay if you need an urgent answer.</b>
        If you need to confirm information or let your friend or date know about a
        change of plans, you can definitely double text to keep them updated. Maybe
        the restaurant you told them to meet you at is closed and you need to go somewhere
        else. Or maybe you asked for an address for their party and they haven\u2019t
        responded when you\u2019re about to leave. Either way, shoot them a message
        to check in.\n<ul>\n<li>\n<b>First text:</b> \u201CSO excited to see you tonight.
        Where are we going?\u201D<br> <b>Second text:</b> \u201CI\u2019m just about
        to leave \U0001F60A What\u2019s the address again?\u201D</li>\n<li>\n<b>First
        text:</b> \u201COMG do you want to go to the Harry Styles concert with me?\u201D<br>
        <b>Second text:</b> \u201CTickets are going pretty fast! Let me know if I
        should snag some for us!\u201D</li>\n</ul>\n</div>\n<div class=\"clearall\"></div>\n<div
        class=\"scrolltomarker\" data-isstep=\"1\" id=\"scrollto_marker_steps_3\"></div>\n</li>\n<li
