        0.0pt; padding-top: 0.0pt; text-align: justify;\"><span class=\"jgG6ef C9DxTc
        \" style=\"color: #ffffff; font-family: Arial; font-weight: 400; vertical-align:
        baseline;\">We are dedicated to upholding the historic Adventist beliefs without
        the mixture of new lights. Our special emphasis is to present the present
        truth of the third angel\u2019s message with all its telling force. Our purpose
        is to help all of God\u2019s remnant people press together in unity, holding
        high the banner inscribed with </span><span class=\"jgG6ef C9DxTc \" style=\"color:
        #ffffff; font-family: Arial; font-weight: 700; vertical-align: baseline;\">\u201CThe
        Commandments of God and the Faith of Jesus.\u201D</span></p><p  dir=\"ltr\"
