        id=\"topheading\"><a href=\"/topical/t/the_third_living_creature.htm\" title=\"The
        Third Living Creature\">&#9668;</a> The Third Message: Blessings for a Defiled
        People <a href=\"/topical/t/the_third_month.htm\" title=\"The Third Month\">&#9658;</a></div></td></tr></table></div><div
        align=\"center\" class=\"maintable2\"><table border=\"0\" cellspacing=\"0\"
        cellpadding=\"0\" align=\"center\"><tr><td><div id=\"topverse\">Jump to: <a
        href=\"#sub\" title=\"Subtopics\">Subtopics</a> &#8226; <a href=\"#rel\" title=\"Related
        Terms\">Terms</a></div><div id=\"leftbox\"><div class=\"padleft\"><a name=\"te\"
        id=\"te\"></a><div class=\"vheading2\">Topical Encyclopedia</div>The Third
        Message, as delivered by the prophet Haggai, is a profound declaration of
        divine grace and restoration for a people who have been defiled by their disobedience
        and neglect of God's commands. This message is found in <a href=\"/haggai/2-10.htm\">Haggai
        2:10-19</a> and serves as a pivotal moment in the prophetic ministry of Haggai,
        addressing the spiritual and physical condition of the Israelites following
        their return from Babylonian exile.<br><br><b>Context and Background</b><br><br>The
        historical context of Haggai's prophecy is crucial for understanding the significance
        of the Third Message. The Israelites had returned from exile with the task
        of rebuilding the temple in Jerusalem, a symbol of God's presence among His
        people. However, their initial enthusiasm waned, and they became preoccupied
        with their own homes and affairs, neglecting the temple's reconstruction.
        This neglect led to a period of spiritual and material barrenness, as described
        in <a href=\"/haggai/1-6.htm\">Haggai 1:6</a>: \"You have planted much but
        harvested little. You eat, but never have enough. You drink, but never have
        your fill. You put on clothes, but are not warm. You earn wages, only to put
        them in a bag with holes.\"<br><br><b>The Message Delivered</b><br><br>Haggai's
        Third Message, delivered on the twenty-fourth day of the ninth month in the
        second year of King Darius, begins with a series of questions posed to the
        priests regarding ceremonial law and purity (<a href=\"/haggai/2-11.htm\">Haggai
        2:11-13</a>). The questions highlight the principle that holiness is not transferable,
        but defilement is. This serves as an allegory for the spiritual state of the
        people: their defilement had rendered their offerings and works unclean in
        the sight of God.<br><br><a href=\"/haggai/2-14.htm\">Haggai 2:14</a> states,
        \"So it is with this people and this nation before Me, declares the LORD,
        and so it is with every work of their hands; and whatever they offer there
        is defiled.\" This pronouncement underscores the severity of their spiritual
        condition and the need for repentance and renewal.<br><br><b>Promise of Blessing</b><br><br>Despite
        the people's defilement, the Third Message is ultimately one of hope and restoration.
        God, in His mercy, promises to bless the people from that day forward. <a
        href=\"/haggai/2-19.htm\">Haggai 2:19</a> declares, \"Is there still seed
        in the barn? As yet, the vine, the fig tree, the pomegranate, and the olive
        tree have not yielded fruit. But from this day on I will bless you.\"<br><br>This
        promise signifies a turning point, where God assures the Israelites that their
        renewed commitment to rebuilding the temple and prioritizing His presence
        will result in divine favor and prosperity. The emphasis is on God's initiative
        to bless, despite the people's previous failures, highlighting His grace and
        faithfulness.<br><br><b>Theological Implications</b><br><br>The Third Message
        reveals several key theological themes:<br><br>1. <b>Holiness and Defilement</b>:
        The message illustrates the nature of holiness and defilement, emphasizing
        that while sin and impurity can spread and contaminate, holiness requires
        intentional pursuit and dedication to God's commands.<br><br>2. <b>Divine
        Grace</b>: Despite the people's unworthiness, God extends grace and promises
        blessing, demonstrating His covenantal faithfulness and willingness to restore
        those who turn back to Him.<br><br>3. <b>Repentance and Renewal</b>: The call
        to rebuild the temple serves as a metaphor for spiritual renewal. The people's
        physical act of rebuilding is intertwined with their spiritual restoration,
        showing that true repentance involves both heart and action.<br><br>4. <b>God's
        Sovereignty</b>: The message reaffirms God's control over creation and His
        ability to bless or withhold blessing according to His purposes. The promise
        of future prosperity is contingent upon the people's obedience and alignment
        with His will.<br><br>In summary, the Third Message in Haggai is a powerful
        testament to God's readiness to bless a defiled people who return to Him with
        sincere hearts and renewed commitment. It serves as a reminder of the transformative
        power of divine grace and the importance of prioritizing God's presence in
        the life of His people.</div></div><div id=\"centbox\"><div class=\"padcent\"><a
