        event ) {\n\t\t\tif ( 'Escape' === event.key ) {\n\t\t\t\tdropdown.dataset.lastkey
        = 'escape';\n\t\t\t} else {\n\t\t\t\tdelete dropdown.dataset.lastkey;\n\t\t\t}\n\t\t}\n\t\tfunction
        onClick() {\n\t\t\tdelete dropdown.dataset.lastkey;\n\t\t}\n\t\tdropdown.addEventListener(
        'keyup', onKeyUp );\n\t\tdropdown.addEventListener( 'click', onClick );\n\t\tdropdown.addEventListener(
        'change', onSelectChange );\n\t} )( [\"wp-block-archives-6\",\"https://www.slangsphere.com\"]
