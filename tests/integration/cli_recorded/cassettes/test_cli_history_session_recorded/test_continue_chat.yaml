        class=\"step_num\" aria-hidden=\"true\">1</div><div class=\"step\">\n<b class=\"whb\"
        aria-hidden=\"true\">Double texting usually isn\u2019t the best way to continue
        your convo.</b> It\u2019s a bummer when you don\u2019t get a text back, but
        a double text could sound pushy and be a turn-off. Even if you don\u2019t
        intend to, sending multiple messages without hearing back from a person might
        come across as clingy or desperate.<sup id=\"_ref-1\" class=\"reference trusted\"
        aria-label=\"Link to Reference 1\"><a href=\"#_note-1\">[1]</a><span class=\"ts_popup
        trustedsource\" hidden id=\"ts_popup_1\" style=\"display: none;\">\n\t<span
