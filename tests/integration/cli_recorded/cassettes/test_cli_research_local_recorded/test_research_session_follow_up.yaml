      which links likely have substantive information vs navigation/ads\n\n4. **SKIM**
      - Use `get_link_summaries` to preview promising pages\n   - Read AI-generated
      summaries to decide if full content is needed\n   - Summaries are generated
      in the background - may show \"processing\" initially\n   - This saves tokens
      and speeds up your research\n\n5. **DEEP READ** - Use `get_relevant_content`
      for targeted extraction\n   - Provide a specific query to retrieve only relevant
      content sections\n   - Use `get_full_content` only when comprehensive understanding
