name: Publish package

on:
  push:
    branches:
      - main
    paths:
      - pyproject.toml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-package-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      should_release: ${{ steps.version.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Detect version bump
        id: version
        run: |
          mkdir -p temp
          if git cat-file -e HEAD^:pyproject.toml 2>/dev/null; then
            git show HEAD^:pyproject.toml > temp/previous-pyproject.toml
            python scripts/release_version_info.py \
              --current pyproject.toml \
              --previous temp/previous-pyproject.toml
          else
            python scripts/release_version_info.py --current pyproject.toml
          fi

      - name: Skip when version did not change
        if: steps.version.outputs.should_release != 'true'
        run: echo "pyproject.toml changed without a version bump, skipping release."

      - name: Sync development environment
        if: steps.version.outputs.should_release == 'true'
        run: uv sync --group dev --extra tray --extra xmpp --extra playwright

      - name: Run full test suite
        if: steps.version.outputs.should_release == 'true'
        run: uv run pytest -q

      - name: Build wheel and sdist
        if: steps.version.outputs.should_release == 'true'
        run: uv build

      - name: Upload built distributions
        if: steps.version.outputs.should_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ steps.version.outputs.version }}
          path: dist/*
          if-no-files-found: error

      - name: Create or update GitHub release
        if: steps.version.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_TAG" \
              --generate-notes
          fi

  publish-pypi:
    needs: release
    if: needs.release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/asky-cli
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.release.outputs.version }}
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
